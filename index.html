<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================
        // AUTHENTICATION & AUTHORIZATION
        // ============================================
        
        const USERS = {}; // No hardcoded passwords — all auth goes to backend

        class AuthService {
            static currentUser = null;

            static async login(username, password) {
                const trimmedUsername = username.trim();
                const trimmedPassword = password.trim();
                
                // Try staff login first
                try {
                    const res = await fetch(`${API_URL}/auth/staff-login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: trimmedUsername, password: trimmedPassword })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        this.currentUser = data.user;
                        sessionStorage.setItem('currentUser', JSON.stringify(this.currentUser));
                        return { success: true, user: this.currentUser };
                    }
                } catch (e) {}

                // Try doctor login
                try {
                    const res = await fetch(`${API_URL}/auth/doctor-login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: trimmedUsername, password: trimmedPassword })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        this.currentUser = data.user;
                        sessionStorage.setItem('currentUser', JSON.stringify(this.currentUser));
                        return { success: true, user: this.currentUser };
                    }
                } catch (e) {}
                
                return { success: false, error: 'Invalid username or password' };
            }

            static logout() {
                this.currentUser = null;
                sessionStorage.removeItem('currentUser');
            }

            static isAuthenticated() {
                if (this.currentUser) return true;
                const stored = sessionStorage.getItem('currentUser');
                if (stored) {
                    try {
                        this.currentUser = JSON.parse(stored);
                        return true;
                    } catch (e) {
                        return false;
                    }
                }
                return false;
            }

            static getCurrentUser() {
                if (!this.currentUser) {
                    const stored = sessionStorage.getItem('currentUser');
                    if (stored) {
                        try {
                            this.currentUser = JSON.parse(stored);
                        } catch (e) {
                            this.currentUser = null;
                        }
                    }
                }
                return this.currentUser;
            }

            static hasAccess(role) {
                const user = this.getCurrentUser();
                if (!user) return false;
                // Admin has access to all modules
                if (user.role === 'admin') return true;
                return user.role === role;
            }
        }

        // ============================================
        // API LAYER — Real MongoDB backend via Render
        // LESSON: cache:'no-store' on every fetch — never stale data
        // LESSON: always refetch after write — DB is single source of truth
        // ============================================

        // LESSON: auto-detect localhost vs production
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://localhost:3000/api'
          : 'https://sims-hms.onrender.com/api';

        // LESSON: ping server on load + every 10 mins to prevent cold-start delay
        async function pingServer() {
          try {
            await fetch(`${API_URL}/health`, { cache: 'no-store' });
            console.log('✓ HMS Backend is awake');
          } catch (e) {
            console.warn('⚠ Backend sleeping, waking up...');
          }
        }
        pingServer();
        setInterval(pingServer, 10 * 60 * 1000);

        // ============================================
        // SERVICE LAYER — All calls go to MongoDB via Render API
        // LESSON: cache:'no-store' on every GET
        // LESSON: after every POST/PUT, caller re-fetches fresh data
        // ============================================

        class DoctorManagementService {
            static async registerDoctor(doctorData) {
                const res = await fetch(`${API_URL}/doctors`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(doctorData)
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to register doctor'); }
                return await res.json();
            }

            static async getAllDoctors() {
                const res = await fetch(`${API_URL}/doctors`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch doctors');
                return await res.json();
            }

            static async getDoctor(doctorId) {
                const doctors = await this.getAllDoctors();
                return doctors.find(d => d.doctorId === doctorId) || null;
            }
        }

        class PatientService {
            static async registerPatient(patientData) {
                const res = await fetch(`${API_URL}/patients`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patientData)
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to register patient'); }
                return await res.json(); // returns { patient, bill }
            }

            static async getAllPatients() {
                const res = await fetch(`${API_URL}/patients`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch patients');
                return await res.json();
            }

            static async getPatient(patientId) {
                const res = await fetch(`${API_URL}/patients/${patientId}`, { cache: 'no-store' });
                if (!res.ok) return null;
                return await res.json();
            }
        }

        class DoctorService {
            static async createEncounter(encounterData) {
                const res = await fetch(`${API_URL}/encounters`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(encounterData)
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to create encounter'); }
                return await res.json();
            }

            static async orderLabTests(encounterId, patientId, tests) {
                const res = await fetch(`${API_URL}/labtests/bulk`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ encounterId, patientId, tests })
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to order lab tests'); }
                return await res.json();
            }

            static async createPrescription(prescriptionData) {
                const res = await fetch(`${API_URL}/prescriptions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(prescriptionData)
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to create prescription'); }
                return await res.json();
            }

            static async getEncountersByPatient(patientId) {
                const res = await fetch(`${API_URL}/encounters/patient/${patientId}`, { cache: 'no-store' });
                if (!res.ok) return [];
                return await res.json();
            }

            static async getLabTestsByEncounter(encounterId) {
                const res = await fetch(`${API_URL}/labtests/encounter/${encounterId}`, { cache: 'no-store' });
                if (!res.ok) return [];
                return await res.json();
            }
        }

        class LabService {
            static async getPendingTests() {
                const res = await fetch(`${API_URL}/labtests?status=PENDING`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch pending tests');
                return await res.json();
            }

            static async getAllTests() {
                const res = await fetch(`${API_URL}/labtests`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch tests');
                return await res.json();
            }

            static async updateTestResult(testId, result) {
                const res = await fetch(`${API_URL}/labtests/${testId}/result`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ result })
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to update result'); }
                return await res.json();
            }
        }

        class PharmacyService {
            static async getPendingPrescriptions() {
                const res = await fetch(`${API_URL}/prescriptions?status=PENDING`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch prescriptions');
                return await res.json();
            }

            static async issueMedicines(prescriptionId, medicines) {
                const res = await fetch(`${API_URL}/prescriptions/${prescriptionId}/issue`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ medicines })
                });
                if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Failed to issue medicines'); }
                return await res.json(); // returns { prescription, bill }
            }
        }

        class BillingService {
            static async getBillsByPatient(patientId) {
                const res = await fetch(`${API_URL}/bills/patient/${patientId}`, { cache: 'no-store' });
                if (!res.ok) return [];
                return await res.json();
            }

            static async getAllBills() {
                const res = await fetch(`${API_URL}/bills`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch bills');
                return await res.json();
            }
        }

        class AdminService {
            static async getDashboardStats() {
                const res = await fetch(`${API_URL}/stats`, { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch stats');
                return await res.json();
            }
        }

        // ============================================
        // UI COMPONENTS
        // ============================================

        // Login Component
        function LoginPage({ onLoginSuccess }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPassword, setShowPassword] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                setLoading(true);
                try {
                    const result = await AuthService.login(username, password);
                    if (result.success) {
                        onLoginSuccess(result.user);
                    } else {
                        setError(result.error);
                        setPassword('');
                    }
                } catch (e) {
                    setError('Connection error. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const fillCredentials = (user, pass) => {
                setUsername(user);
                setPassword(pass);
                setError('');
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="text-6xl mb-4">🏥</div>
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Hospital Management System</h1>
                            <p className="text-gray-600">Please login to continue</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Username
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Enter username"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Password
                                </label>
                                <div className="relative">
                                    <input
                                        type={showPassword ? "text" : "password"}
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12"
                                        placeholder="Enter password"
                                        required
                                    />
                                    <button
                                        type="button"
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                    >
                                        {showPassword ? '🙈' : '👁️'}
                                    </button>
                                </div>
                            </div>

                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                                    ❌ {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 px-4 rounded-lg hover:from-blue-700 hover:to-purple-700 font-semibold text-lg transition-all disabled:opacity-50"
                            >
                                {loading ? 'Logging in...' : '🔐 Login'}
                            </button>
                        </form>

                        <div className="mt-8 pt-6 border-t border-gray-200">
                            <div className="text-sm text-gray-600 mb-3 font-semibold">Staff Roles:</div>
                            <div className="grid grid-cols-3 gap-2 text-xs text-center text-gray-500">
                                <div className="bg-blue-50 p-2 rounded">📋 reception</div>
                                <div className="bg-green-50 p-2 rounded">⚕️ doctor</div>
                                <div className="bg-purple-50 p-2 rounded">🔬 lab</div>
                                <div className="bg-orange-50 p-2 rounded">💊 pharmacy</div>
                                <div className="bg-pink-50 p-2 rounded">💳 billing</div>
                                <div className="bg-red-50 p-2 rounded">📊 admin</div>
                            </div>
                            <div className="text-xs text-gray-400 mt-3 text-center">Contact your administrator for login credentials</div>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function HospitalManagementSystem() {
            const [currentModule, setCurrentModule] = useState('reception');
            const [dbInitialized, setDbInitialized] = useState(false);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);

            useEffect(() => {
                // Check if user is already logged in
                if (AuthService.isAuthenticated()) {
                    setIsAuthenticated(true);
                    setCurrentUser(AuthService.getCurrentUser());
                }

                // LESSON: ping API on load instead of IndexedDB init
                // App shows even if Render is sleeping — it wakes up within 30s
                fetch(`${API_URL}/health`, { cache: 'no-store' })
                    .then(() => setDbInitialized(true))
                    .catch(() => setDbInitialized(true)); // show app regardless
            }, []);

            const handleLoginSuccess = (user) => {
                setIsAuthenticated(true);
                setCurrentUser(user);
                setCurrentModule(user.role);
            };

            const handleLogout = () => {
                if (confirm('Are you sure you want to logout?')) {
                    AuthService.logout();
                    setIsAuthenticated(false);
                    setCurrentUser(null);
                    setCurrentModule('reception');
                }
            };

            if (!dbInitialized) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gray-100">
                        <div className="text-center">
                            <div className="text-2xl font-bold text-blue-600 mb-2">Hospital Management System</div>
                            <div className="text-lg text-gray-600">Connecting to server...</div>
                        </div>
                    </div>
                );
            }

            if (!isAuthenticated) {
                return <LoginPage onLoginSuccess={handleLoginSuccess} />;
            }

            const canAccessModule = (module) => {
                if (currentUser.role === 'admin') return true;
                return currentUser.role === module;
            };

            const handleModuleChange = (module) => {
                if (!canAccessModule(module)) {
                    alert(`Access Denied: You don't have permission to access ${module} module.`);
                    return;
                }
                setCurrentModule(module);
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold">🏥 Hospital Management System</h1>
                                    <p className="text-sm text-blue-100 mt-1">Full-Stack | MongoDB Atlas + Render + GitHub Pages</p>
                                </div>
                                <div className="text-right">
                                    <div className="bg-white bg-opacity-20 rounded-lg px-4 py-2 mb-2">
                                        <div className="text-sm opacity-90">Logged in as:</div>
                                        <div className="font-semibold">{currentUser.name}</div>
                                        <div className="text-xs opacity-75">{currentUser.username}</div>
                                    </div>
                                    <button
                                        onClick={handleLogout}
                                        className="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium transition-all"
                                    >
                                        🚪 Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-10">
                        <div className="container mx-auto px-4">
                            <div className="flex space-x-1 overflow-x-auto">
                                {[
                                    { id: 'reception', label: 'Reception', icon: '📋' },
                                    { id: 'doctor', label: 'Doctor', icon: '⚕️' },
                                    { id: 'lab', label: 'Laboratory', icon: '🔬' },
                                    { id: 'pharmacy', label: 'Pharmacy', icon: '💊' },
                                    { id: 'billing', label: 'Billing', icon: '💳' },
                                    { id: 'admin', label: 'Admin', icon: '📊' }
                                ].map(module => {
                                    const hasAccess = canAccessModule(module.id);
                                    return (
                                        <button
                                            key={module.id}
                                            onClick={() => handleModuleChange(module.id)}
                                            disabled={!hasAccess}
                                            className={`px-6 py-3 font-medium capitalize transition-colors whitespace-nowrap ${
                                                currentModule === module.id
                                                    ? 'bg-blue-600 text-white border-b-4 border-blue-800'
                                                    : hasAccess
                                                    ? 'text-gray-700 hover:bg-gray-100'
                                                    : 'text-gray-400 cursor-not-allowed bg-gray-100'
                                            }`}
                                        >
                                            <span className="mr-2">{module.icon}</span>
                                            {module.label}
                                            {!hasAccess && <span className="ml-2">🔒</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        {currentModule === 'reception' && <ReceptionModule />}
                        {currentModule === 'doctor' && <DoctorModule />}
                        {currentModule === 'lab' && <LabModule />}
                        {currentModule === 'pharmacy' && <PharmacyModule />}
                        {currentModule === 'billing' && <BillingModule />}
                        {currentModule === 'admin' && <AdminModule />}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-4 mt-12">
                        <div className="container mx-auto px-4 text-center text-sm">
                            <p>Hospital Management System</p>
                            <p className="text-gray-400 mt-1">Powered by MongoDB Atlas + Render | Logged in as: {currentUser.name}</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // ============================================
        // RECEPTION MODULE (ENHANCED WITH DOCTOR REGISTRATION)
        // ============================================
        function ReceptionModule() {
            const [activeTab, setActiveTab] = useState('patient'); // 'patient' or 'doctor'
            
            // Patient Registration State
            const [patientForm, setPatientForm] = useState({
                firstName: '',
                lastName: '',
                age: '',
                gender: '',
                phone: '',
                address: '',
                chiefComplaint: '',
                assignedDoctorId: ''
            });
            
            // Doctor Registration State
            const [doctorForm, setDoctorForm] = useState({
                name: '',
                specialization: '',
                phone: '',
                email: '',
                qualification: '',
                password: ''
            });
            
            const [message, setMessage] = useState(null);
            const [patients, setPatients] = useState([]);
            const [doctors, setDoctors] = useState([]);
            const [loading, setLoading] = useState(false);

            const specializations = [
                'Cardiology',
                'Neurology',
                'Orthopedics',
                'Pediatrics',
                'General Medicine',
                'Dermatology',
                'ENT',
                'Psychiatry',
                'Gynecology',
                'Gastroenterology'
            ];

            const chiefComplaints = [
                'Fever',
                'Chest Pain',
                'Headache',
                'Abdominal Pain',
                'Respiratory Issues',
                'Joint Pain',
                'Skin Problems',
                'Mental Health',
                'Pregnancy Related',
                'Digestive Issues',
                'General Checkup',
                'Other'
            ];

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const allPatients = await PatientService.getAllPatients();
                const allDoctors = await DoctorManagementService.getAllDoctors();
                setPatients(allPatients.sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt)));
                setDoctors(allDoctors.sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt)));
            };

            const handlePatientSubmit = async (e) => {
                e.preventDefault();
                
                if (!patientForm.firstName || !patientForm.age || !patientForm.gender || !patientForm.chiefComplaint) {
                    setMessage({ type: 'error', text: 'Please fill all required fields (First Name, Age, Gender, Chief Complaint)' });
                    return;
                }

                if (!patientForm.assignedDoctorId) {
                    setMessage({ type: 'error', text: 'Please choose a doctor for the patient' });
                    return;
                }

                setLoading(true);
                try {
                    const result = await PatientService.registerPatient(patientForm);
                    const assignedDoctor = doctors.find(d => d.doctorId === patientForm.assignedDoctorId);
                    setMessage({ 
                        type: 'success', 
                        text: `✅ Patient registered successfully!\n\nPatient ID: ${result.patient.patientId}\nChosen Doctor: ${assignedDoctor ? assignedDoctor.name : 'N/A'}\nRegistration Bill: ${result.bill.billId} - ₹${result.bill.totalAmount}` 
                    });
                    setPatientForm({
                        firstName: '',
                        lastName: '',
                        age: '',
                        gender: '',
                        phone: '',
                        address: '',
                        chiefComplaint: '',
                        assignedDoctorId: ''
                    });
                    await loadData();
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Registration failed: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            const handleDoctorSubmit = async (e) => {
                e.preventDefault();
                
                if (!doctorForm.name || !doctorForm.specialization) {
                    setMessage({ type: 'error', text: 'Please fill all required fields (Name, Specialization)' });
                    return;
                }
                if (!doctorForm.password || doctorForm.password.length < 6) {
                    setMessage({ type: 'error', text: 'Password must be at least 6 characters' });
                    return;
                }

                setLoading(true);
                try {
                    const result = await DoctorManagementService.registerDoctor(doctorForm);
                    setMessage({ 
                        type: 'success', 
                        text: `✅ Doctor registered successfully!\n\nDoctor Login ID: ${result.doctorId}\nName: ${result.name}\nSpecialization: ${result.specialization}\n\n⚠️ Save this Login ID — the doctor will use it to log in!` 
                    });
                    setDoctorForm({
                        name: '',
                        specialization: '',
                        phone: '',
                        email: '',
                        qualification: '',
                        password: ''
                    });
                    await loadData();
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Doctor registration failed: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-7xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800 flex items-center">
                        <span className="mr-3">📋</span>
                        Reception Desk
                    </h2>

                    {message && (

        // ============================================

        // DOCTOR MODULE
        // ============================================
        function DoctorModule() {
            const [step, setStep] = useState(1);
            const [patients, setPatients] = useState([]);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [doctorName, setDoctorName] = useState('');
            const [diagnosis, setDiagnosis] = useState('');
            const [notes, setNotes] = useState('');
            const [labTests, setLabTests] = useState([]);
            const [medicines, setMedicines] = useState([]);
            const [message, setMessage] = useState(null);
            const [encounters, setEncounters] = useState([]);
            const [selectedEncounter, setSelectedEncounter] = useState(null);
            const [encounterTests, setEncounterTests] = useState([]);
            const [loading, setLoading] = useState(false);

            const [doctors, setDoctors] = useState([]);
            
            useEffect(() => {
                loadDoctors();
            }, [patients]);
            
            const loadDoctors = async () => {
                const allDoctors = await DoctorManagementService.getAllDoctors();
                setDoctors(allDoctors);
            };
            const availableTests = [
                'Complete Blood Count (CBC)',
                'Blood Sugar (Fasting)',
                'Blood Sugar (PP)',
                'Lipid Profile',
                'Liver Function Test (LFT)',
                'Kidney Function Test (KFT)',
                'Thyroid Profile (T3, T4, TSH)',
                'Urine Analysis',
                'X-Ray Chest',
                'ECG',
                'Hemoglobin A1c',
                'Vitamin D',
                'Vitamin B12'
            ];

            useEffect(() => {
                loadPatients();
            }, []);

            const loadPatients = async () => {
                const allPatients = await PatientService.getAllPatients();
                setPatients(allPatients.sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt)));
            };

            const loadPatientEncounters = async (patientId) => {
                const patientEncounters = await DoctorService.getEncountersByPatient(patientId);
                setEncounters(patientEncounters.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            };

            const loadEncounterTests = async (encounterId) => {
                const tests = await DoctorService.getLabTestsByEncounter(encounterId);
                setEncounterTests(tests);
            };

            const handlePatientSelect = (patient) => {
                setSelectedPatient(patient);
                loadPatientEncounters(patient.patientId);
                setStep(2);
                setMessage(null);
            };

            const addLabTest = (testName) => {
                if (!labTests.find(t => t.testName === testName)) {
                    setLabTests([...labTests, { testName }]);
                }
            };

            const removeLabTest = (testName) => {
                setLabTests(labTests.filter(t => t.testName !== testName));
            };

            const addMedicine = () => {
                setMedicines([...medicines, { medicineName: '', dosage: '', duration: '', quantity: 1, price: 50 }]);
            };

            const updateMedicine = (index, field, value) => {
                const updated = [...medicines];
                updated[index][field] = value;
                setMedicines(updated);
            };

            const removeMedicine = (index) => {
                setMedicines(medicines.filter((_, i) => i !== index));
            };

            const handleSubmit = async () => {
                if (!doctorName || !diagnosis) {
                    setMessage({ type: 'error', text: '❌ Please select doctor and enter diagnosis' });
                    return;
                }

                if (labTests.length === 0 && medicines.length === 0) {
                    setMessage({ type: 'error', text: '❌ Please order at least one lab test or prescribe at least one medicine' });
                    return;
                }

                setLoading(true);
                try {
                    // Create encounter
                    const encounter = await DoctorService.createEncounter({
                        patientId: selectedPatient.patientId,
                        doctorName,
                        diagnosis,
                        notes
                    });

                    // Order lab tests
                    if (labTests.length > 0) {
                        await DoctorService.orderLabTests(encounter.encounterId, selectedPatient.patientId, labTests);
                    }

                    // Create prescription
                    const validMedicines = medicines.filter(m => m.medicineName && m.dosage);
                    if (validMedicines.length > 0) {
                        await DoctorService.createPrescription({
                            encounterId: encounter.encounterId,
                            patientId: selectedPatient.patientId,
                            medicines: validMedicines
                        });
                    }

                    setMessage({ 
                        type: 'success', 
                        text: `✅ Encounter created successfully!\n\n• Encounter ID: ${encounter.encounterId}\n• Lab Tests Ordered: ${labTests.length}\n• Medicines Prescribed: ${validMedicines.length}\n\nData is now available in Lab and Pharmacy modules.` 
                    });

                    // Reset form
                    setDoctorName('');
                    setDiagnosis('');
                    setNotes('');
                    setLabTests([]);
                    setMedicines([]);
                    setTimeout(() => {
                        setStep(1);
                        setSelectedPatient(null);
                        setMessage(null);
                    }, 3000);
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Failed to create encounter: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            const viewEncounter = async (encounter) => {
                if (selectedEncounter?.encounterId === encounter.encounterId) {
                    setSelectedEncounter(null);
                    setEncounterTests([]);
                } else {
                    setSelectedEncounter(encounter);
                    await loadEncounterTests(encounter.encounterId);
                }
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800 flex items-center">
                        <span className="mr-3">⚕️</span>
                        Doctor Consultation
                    </h2>

                    {message && (
                        <div className={`mb-6 p-4 rounded-lg shadow-md ${message.type === 'success' ? 'bg-green-50 border-l-4 border-green-500 text-green-800' : 'bg-red-50 border-l-4 border-red-500 text-red-800'}`}>
                            <div className="font-medium whitespace-pre-line">{message.text}</div>
                        </div>
                    )}

                    {/* Step 1: Select Patient */}
                    {step === 1 && (
                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <h3 className="text-xl font-semibold mb-4 text-blue-700 border-b pb-2">
                                Step 1: Select Patient for Consultation
                            </h3>
                            {patients.length === 0 ? (
                                <div className="text-center py-12 text-gray-500">
                                    <div className="text-4xl mb-2">👥</div>
                                    <div>No patients registered yet</div>
                                    <div className="text-sm mt-2">Please register patients in Reception module first</div>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {patients.map(patient => (
                                        <div 
                                            key={patient.patientId}
                                            className="flex justify-between items-center p-4 border rounded-lg hover:shadow-md cursor-pointer transition-all hover:border-blue-400 bg-gray-50"
                                            onClick={() => handlePatientSelect(patient)}
                                        >
                                            <div>
                                                <div className="font-semibold text-lg">{patient.firstName} {patient.lastName}</div>
                                                <div className="text-sm text-gray-600">{patient.patientId} | Age: {patient.age} | {patient.gender}</div>
                                                {patient.phone && <div className="text-sm text-gray-500">📞 {patient.phone}</div>}
                                            </div>
                                            <button className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                                                Select →
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Step 2: Create Encounter */}
                    {step === 2 && selectedPatient && (
                        <div>
                            <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg mb-6">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <div className="font-semibold text-lg">Selected Patient: {selectedPatient.firstName} {selectedPatient.lastName}</div>
                                        <div className="text-sm text-gray-600">{selectedPatient.patientId} | Age: {selectedPatient.age} | {selectedPatient.gender}</div>
                                    </div>
                                    <button 
                                        onClick={() => {setStep(1); setSelectedPatient(null); setMessage(null);}}
                                        className="px-4 py-2 bg-white border border-blue-300 text-blue-700 rounded-lg hover:bg-blue-100 font-medium"
                                    >
                                        ← Change Patient
                                    </button>
                                </div>
                            </div>
