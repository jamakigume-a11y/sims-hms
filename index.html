        // ============================================
        // LAB MODULE
        // ============================================
        function LabModule() {
            const [tests, setTests] = useState([]);
            const [selectedTest, setSelectedTest] = useState(null);
            const [result, setResult] = useState('');
            const [message, setMessage] = useState(null);
            const [filter, setFilter] = useState('PENDING');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                loadTests();
            }, [filter]);

            const loadTests = async () => {
                if (filter === 'PENDING') {
                    const pendingTests = await LabService.getPendingTests();
                    setTests(pendingTests.sort((a, b) => new Date(b.orderedAt) - new Date(a.orderedAt)));
                } else {
                    const allTests = await LabService.getAllTests();
                    setTests(allTests.sort((a, b) => new Date(b.orderedAt) - new Date(a.orderedAt)));
                }
            };

            const handleSubmitResult = async () => {
                if (!result.trim()) {
                    setMessage({ type: 'error', text: '❌ Please enter test result' });
                    return;
                }

                setLoading(true);
                try {
                    await LabService.updateTestResult(selectedTest.testId, result);
                    setMessage({ type: 'success', text: `✅ Test result submitted successfully!\n\nTest: ${selectedTest.testName}\nResult: ${result}` });
                    setSelectedTest(null);
                    setResult('');
                    await loadTests();
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Failed to submit result: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800 flex items-center">
                        <span className="mr-3">🔬</span>
                        Laboratory Module
                    </h2>

                    {message && (
                        <div className={`mb-6 p-4 rounded-lg shadow-md ${message.type === 'success' ? 'bg-green-50 border-l-4 border-green-500 text-green-800' : 'bg-red-50 border-l-4 border-red-500 text-red-800'}`}>
                            <div className="font-medium whitespace-pre-line">{message.text}</div>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-lg p-6">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 className="text-xl font-semibold text-purple-700">Lab Tests</h3>
                            <div className="flex gap-2">
                                <button
                                    onClick={() => setFilter('PENDING')}
                                    className={`px-6 py-2 rounded-lg font-medium transition-all ${
                                        filter === 'PENDING' 
                                            ? 'bg-orange-600 text-white shadow-md' 
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    Pending Tests
                                </button>
                                <button
                                    onClick={() => setFilter('ALL')}
                                    className={`px-6 py-2 rounded-lg font-medium transition-all ${
                                        filter === 'ALL' 
                                            ? 'bg-purple-600 text-white shadow-md' 
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    All Tests
                                </button>
                            </div>
                        </div>

                        {tests.length === 0 ? (
                            <div className="text-center py-16 text-gray-500">
                                <div className="text-6xl mb-4">🔬</div>
                                <div className="text-xl font-medium">No {filter === 'PENDING' ? 'pending' : ''} tests found</div>
                                <div className="text-sm mt-2">Tests ordered by doctors will appear here</div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {tests.map(test => (
                                    <div key={test.testId} className={`border-2 rounded-lg p-5 transition-all ${
                                        test.status === 'COMPLETED' 
                                            ? 'bg-green-50 border-green-200' 
                                            : 'bg-orange-50 border-orange-200'
                                    }`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="font-semibold text-xl text-gray-800 mb-2">{test.testName}</div>
                                                <div className="grid grid-cols-2 gap-2 text-sm">
                                                    <div>
                                                        <span className="text-gray-600">Patient ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-blue-600">{test.patientId}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Encounter ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-purple-600">{test.encounterId}</span>
                                                    </div>
                                                </div>
                                                <div className="text-xs text-gray-500 mt-2">
                                                    Ordered: {new Date(test.orderedAt).toLocaleString()}
                                                </div>
                                                <div className="mt-3">
                                                    <span className={`inline-block px-4 py-1 text-sm rounded-full font-medium ${
                                                        test.status === 'COMPLETED' 
                                                            ? 'bg-green-500 text-white' 
                                                            : 'bg-orange-500 text-white'
                                                    }`}>
                                                        {test.status === 'COMPLETED' ? '✓ COMPLETED' : '⏳ PENDING'}
                                                    </span>
                                                </div>
                                                {test.status === 'COMPLETED' && (
                                                    <div className="mt-4 p-4 bg-white rounded-lg border-2 border-green-300">
                                                        <div className="text-sm font-semibold text-green-800 mb-1">Test Result:</div>
                                                        <div className="text-sm text-gray-700">{test.result}</div>
                                                        <div className="text-xs text-gray-500 mt-2">
                                                            Completed: {new Date(test.completedAt).toLocaleString()}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            {test.status === 'PENDING' && (
                                                <button
                                                    onClick={() => {setSelectedTest(test); setMessage(null);}}
                                                    className="ml-4 px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-medium transition-all shadow-md"
                                                >
                                                    Enter Result →
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Result Entry Modal */}
                    {selectedTest && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg p-6 max-w-lg w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-4 text-purple-700">Enter Test Result</h3>
                                <div className="mb-4 p-4 bg-purple-50 rounded-lg border border-purple-200">
                                    <div className="text-sm text-gray-700 mb-2">
                                        <span className="font-medium">Test:</span> 
                                        <span className="ml-2 text-purple-700 font-semibold">{selectedTest.testName}</span>
                                    </div>
                                    <div className="text-sm text-gray-700 mb-2">
                                        <span className="font-medium">Patient ID:</span> 
                                        <span className="ml-2 font-mono">{selectedTest.patientId}</span>
                                    </div>
                                    <div className="text-sm text-gray-700">
                                        <span className="font-medium">Encounter ID:</span> 
                                        <span className="ml-2 font-mono">{selectedTest.encounterId}</span>
                                    </div>
                                </div>
                                <textarea
                                    value={result}
                                    onChange={(e) => setResult(e.target.value)}
                                    className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                    rows="5"
                                    placeholder="Enter test result (e.g., Normal, Abnormal with values, detailed findings, etc.)"
                                />
                                <div className="flex gap-3 mt-4">
                                    <button
                                        onClick={handleSubmitResult}
                                        disabled={loading}
                                        className="flex-1 bg-green-600 text-white py-3 px-4 rounded-lg hover:bg-green-700 font-medium transition-all disabled:bg-gray-400"
                                    >
                                        {loading ? 'Submitting...' : '✅ Submit Result'}
                                    </button>
                                    <button
                                        onClick={() => {setSelectedTest(null); setResult('');}}
                                        className="flex-1 bg-gray-300 text-gray-700 py-3 px-4 rounded-lg hover:bg-gray-400 font-medium transition-all"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // PHARMACY MODULE
        // ============================================
        function PharmacyModule() {
            const [prescriptions, setPrescriptions] = useState([]);
            const [selectedPrescription, setSelectedPrescription] = useState(null);
            const [patientDetails, setPatientDetails] = useState(null);
            const [message, setMessage] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                loadPrescriptions();
            }, []);

            const loadPrescriptions = async () => {
                const pending = await PharmacyService.getPendingPrescriptions();
                setPrescriptions(pending.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            };

            const viewPrescription = async (prescription) => {
                const patient = await PatientService.getPatient(prescription.patientId);
                setPatientDetails(patient);
                setSelectedPrescription(prescription);
                setMessage(null);
            };

            const handleIssueMedicines = async () => {
                setLoading(true);
                try {
                    const bill = await PharmacyService.issueMedicines(selectedPrescription.prescriptionId, selectedPrescription.medicines);
                    setMessage({ 
                        type: 'success', 
                        text: `✅ Medicines issued successfully!\n\nBill ID: ${bill.billId}\nTotal Amount: ₹${bill.totalAmount}\n\nBill is now available in Billing module.` 
                    });
                    setSelectedPrescription(null);
                    setPatientDetails(null);
                    await loadPrescriptions();
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Failed to issue medicines: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800 flex items-center">
                        <span className="mr-3">💊</span>
                        Pharmacy Module
                    </h2>

                    {message && (
                        <div className={`mb-6 p-4 rounded-lg shadow-md ${message.type === 'success' ? 'bg-green-50 border-l-4 border-green-500 text-green-800' : 'bg-red-50 border-l-4 border-red-500 text-red-800'}`}>
                            <div className="font-medium whitespace-pre-line">{message.text}</div>
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-lg p-6">
                        <h3 className="text-xl font-semibold mb-4 text-green-700 border-b pb-2">
                            Pending Prescriptions ({prescriptions.length})
                        </h3>

                        {prescriptions.length === 0 ? (
                            <div className="text-center py-16 text-gray-500">
                                <div className="text-6xl mb-4">💊</div>
                                <div className="text-xl font-medium">No pending prescriptions</div>
                                <div className="text-sm mt-2">Prescriptions created by doctors will appear here</div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {prescriptions.map(prescription => (
                                    <div key={prescription.prescriptionId} className="border-2 border-green-200 rounded-lg p-5 bg-green-50 transition-all hover:shadow-md">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="font-semibold text-lg text-gray-800">
                                                    Prescription ID: <span className="font-mono text-green-700">{prescription.prescriptionId}</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 text-sm mt-2">
                                                    <div>
                                                        <span className="text-gray-600">Patient ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-blue-600">{prescription.patientId}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Encounter ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-purple-600">{prescription.encounterId}</span>
                                                    </div>
                                                </div>
                                                <div className="text-sm text-gray-700 mt-2">
                                                    <span className="font-medium">Medicines:</span> {prescription.medicines.length} items
                                                </div>
                                                <div className="text-xs text-gray-500 mt-2">
                                                    Created: {new Date(prescription.createdAt).toLocaleString()}
                                                </div>
                                            </div>
                                            <button
                                                onClick={() => viewPrescription(prescription)}
                                                className="ml-4 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium transition-all shadow-md"
                                            >
                                                View & Issue →
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Prescription Details Modal */}
                    {selectedPrescription && patientDetails && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                                <h3 className="text-2xl font-bold mb-4 text-green-700">💊 Prescription Details</h3>
                                
                                <div className="mb-4 p-4 bg-blue-50 rounded-lg border-2 border-blue-200">
                                    <div className="font-semibold text-lg text-blue-800 mb-2">Patient Information</div>
                                    <div className="grid grid-cols-2 gap-2 text-sm">
                                        <div>
                                            <span className="text-gray-600">Name:</span>
                                            <span className="ml-2 font-medium">{patientDetails.firstName} {patientDetails.lastName}</span>
                                        </div>
                                        <div>
                                            <span className="text-gray-600">Patient ID:</span>
                                            <span className="ml-2 font-mono">{patientDetails.patientId}</span>
                                        </div>
                                        <div>
                                            <span className="text-gray-600">Age:</span>
                                            <span className="ml-2">{patientDetails.age}</span>
                                        </div>
                                        <div>
                                            <span className="text-gray-600">Gender:</span>
                                            <span className="ml-2">{patientDetails.gender}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-4">
                                    <div className="font-semibold text-lg mb-3 text-green-800">Medicines to Issue:</div>
                                    <div className="space-y-3">
                                        {selectedPrescription.medicines.map((med, index) => (
                                            <div key={index} className="border-2 border-green-200 rounded-lg p-4 bg-green-50">
                                                <div className="font-semibold text-lg text-gray-800 mb-2">{index + 1}. {med.medicineName}</div>
                                                <div className="grid grid-cols-3 gap-3 text-sm">
                                                    <div>
                                                        <span className="text-gray-600">Dosage:</span>
                                                        <span className="ml-2 font-medium">{med.dosage}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Duration:</span>
                                                        <span className="ml-2 font-medium">{med.duration}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Quantity:</span>
                                                        <span className="ml-2 font-medium">{med.quantity}</span>
                                                    </div>
                                                </div>
                                                <div className="mt-2 text-sm font-medium text-green-700">
                                                    Price: ₹{med.price || 50} × {med.quantity} = ₹{(med.price || 50) * med.quantity}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-green-100 border-2 border-green-400 p-4 rounded-lg mb-4">
                                    <div className="text-2xl font-bold text-green-800">
                                        Total Bill Amount: ₹{selectedPrescription.medicines.reduce((sum, med) => sum + ((med.price || 50) * med.quantity), 0)}
                                    </div>
                                </div>

                                <div className="flex gap-3">
                                    <button
                                        onClick={handleIssueMedicines}
                                        disabled={loading}
                                        className="flex-1 bg-green-600 text-white py-3 px-4 rounded-lg hover:bg-green-700 font-semibold text-lg transition-all disabled:bg-gray-400 shadow-lg"
                                    >
                                        {loading ? 'Processing...' : '✅ Issue Medicines & Generate Bill'}
                                    </button>
                                    <button
                                        onClick={() => {setSelectedPrescription(null); setPatientDetails(null);}}
                                        className="flex-1 bg-gray-300 text-gray-700 py-3 px-4 rounded-lg hover:bg-gray-400 font-semibold transition-all"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // BILLING MODULE
        // ============================================
        function BillingModule() {
            const [patients, setPatients] = useState([]);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [bills, setBills] = useState([]);

            useEffect(() => {
                loadPatients();
            }, []);

            const loadPatients = async () => {
                const allPatients = await PatientService.getAllPatients();
                setPatients(allPatients.sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt)));
            };

            const loadPatientBills = async (patientId) => {
                const patientBills = await BillingService.getBillsByPatient(patientId);
                setBills(patientBills.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            };

            const handlePatientSelect = async (patient) => {
                setSelectedPatient(patient);
                await loadPatientBills(patient.patientId);
            };

            const getTotalAmount = () => bills.reduce((sum, bill) => sum + bill.totalAmount, 0);

            return (
                <div className="max-w-7xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800 flex items-center">
                        <span className="mr-3">💳</span>
                        Billing Module (Demo)
                    </h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Patient List */}
                        <div className="lg:col-span-1">
                            <div className="bg-white rounded-lg shadow-lg p-6 sticky top-24">
                                <h3 className="text-lg font-semibold mb-4 text-blue-700 border-b pb-2">Select Patient</h3>
                                <div className="space-y-2 max-h-[600px] overflow-y-auto">
                                    {patients.length === 0 ? (
                                        <div className="text-center py-8 text-gray-500">
                                            <div className="text-4xl mb-2">👥</div>
                                            <div className="text-sm">No patients registered</div>
                                        </div>
                                    ) : (
                                        patients.map(patient => (
                                            <div
                                                key={patient.patientId}
                                                onClick={() => handlePatientSelect(patient)}
                                                className={`p-3 border-2 rounded-lg cursor-pointer transition-all ${
                                                    selectedPatient?.patientId === patient.patientId 
                                                        ? 'bg-blue-100 border-blue-500 shadow-md' 
                                                        : 'border-gray-200 hover:bg-blue-50 hover:border-blue-300'
                                                }`}
                                            >
                                                <div className="font-semibold text-gray-800">{patient.firstName} {patient.lastName}</div>
                                                <div className="text-xs font-mono text-gray-600">{patient.patientId}</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Bills */}
                        <div className="lg:col-span-2">
                            <div className="bg-white rounded-lg shadow-lg p-6">
                                <h3 className="text-lg font-semibold mb-4 text-green-700 border-b pb-2">
                                    {selectedPatient ? `Bills for ${selectedPatient.firstName} ${selectedPatient.lastName}` : 'Patient Bills'}
                                </h3>
                                {!selectedPatient ? (
                                    <div className="text-gray-500 text-center py-16">
                                        <div className="text-6xl mb-4">💳</div>
                                        <div className="text-xl">Select a patient to view bills</div>
                                    </div>
                                ) : bills.length === 0 ? (
                                    <div className="text-gray-500 text-center py-16">
                                        <div className="text-6xl mb-4">📄</div>
                                        <div className="text-xl">No bills found for this patient</div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="mb-6 p-4 bg-gradient-to-r from-green-100 to-blue-100 rounded-lg border-2 border-green-300">
                                            <div className="text-center">
                                                <div className="text-sm text-gray-600 mb-1">Total Bills: {bills.length}</div>
                                                <div className="text-3xl font-bold text-green-700">
                                                    Total Amount: ₹{getTotalAmount()}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-4 max-h-[700px] overflow-y-auto">
                                            {bills.map(bill => (
                                                <div key={bill.billId} className="border-2 border-gray-200 rounded-lg p-5 bg-gray-50">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <div className="font-semibold text-xl text-gray-800">{bill.billId}</div>
                                                            <div className={`inline-block mt-2 px-3 py-1 rounded-full text-sm font-medium ${
                                                                bill.type === 'REGISTRATION' 
                                                                    ? 'bg-blue-100 text-blue-700' 
                                                                    : 'bg-green-100 text-green-700'
                                                            }`}>
                                                                {bill.type === 'REGISTRATION' ? '📋 Registration' : '💊 Pharmacy'}
                                                            </div>
                                                            <div className="text-xs text-gray-500 mt-2">
                                                                {new Date(bill.createdAt).toLocaleString()}
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-3xl font-bold text-green-600">
                                                                ₹{bill.totalAmount}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="border-t-2 border-gray-300 pt-4">
                                                        <div className="text-sm font-semibold mb-3 text-gray-700">Itemized Bill:</div>
                                                        <div className="bg-white rounded-lg overflow-hidden border border-gray-200">
                                                            <table className="w-full text-sm">
                                                                <thead className="bg-gray-100 border-b-2 border-gray-300">
                                                                    <tr>
                                                                        <th className="text-left p-3 font-semibold">Item</th>
                                                                        <th className="text-center p-3 font-semibold">Qty</th>
                                                                        <th className="text-right p-3 font-semibold">Price</th>
                                                                        <th className="text-right p-3 font-semibold">Total</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {bill.items.map((item, index) => (
                                                                        <tr key={index} className="border-b border-gray-200 hover:bg-gray-50">
                                                                            <td className="p-3">{item.name}</td>
                                                                            <td className="text-center p-3">{item.quantity}</td>
                                                                            <td className="text-right p-3">₹{item.price}</td>
                                                                            <td className="text-right p-3 font-medium">₹{item.total}</td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                                <tfoot className="bg-green-50 border-t-2 border-green-300">
                                                                    <tr>
                                                                        <td colSpan="3" className="text-right p-3 font-bold text-gray-800">Grand Total:</td>
                                                                        <td className="text-right p-3 font-bold text-green-700 text-lg">₹{bill.totalAmount}</td>
                                                                    </tr>
                                                                </tfoot>
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // ADMIN MODULE
        // ============================================
        function AdminModule() {
            const [stats, setStats] = useState(null);

            useEffect(() => {
                loadStats();
                const interval = setInterval(loadStats, 5000); // Refresh every 5 seconds
                return () => clearInterval(interval);
            }, []);

            const loadStats = async () => {
                const dashboardStats = await AdminService.getDashboardStats();
                setStats(dashboardStats);
            };

            if (!stats) {
                return (
                    <div className="flex items-center justify-center py-16">
                        <div className="text-xl text-gray-600">Loading dashboard statistics...</div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6 text-gray-800 flex items-center">
                        <span className="mr-3">📊</span>
                        Admin Dashboard
                    </h2>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <div className="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-lg shadow-lg p-6">
                            <div className="text-sm opacity-90 mb-1">Total Patients</div>
                            <div className="text-4xl font-bold">{stats.totalPatients}</div>
                            <div className="text-xs mt-2 opacity-75">Registered</div>
                        </div>
                        <div className="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-lg shadow-lg p-6">
                            <div className="text-sm opacity-90 mb-1">Encounters</div>
                            <div className="text-4xl font-bold">{stats.totalEncounters}</div>
                            <div className="text-xs mt-2 opacity-75">Total consultations</div>
                        </div>
                        <div className="bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-lg shadow-lg p-6">
                            <div className="text-sm opacity-90 mb-1">Lab Tests</div>
                            <div className="text-4xl font-bold">{stats.totalTests}</div>
                            <div className="text-xs mt-2 opacity-75">
                                ✓ {stats.completedTests} Completed | ⏳ {stats.pendingTests} Pending
                            </div>
                        </div>
                        <div className="bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-lg shadow-lg p-6">
                            <div className="text-sm opacity-90 mb-1">Total Revenue</div>
                            <div className="text-4xl font-bold">₹{stats.totalRevenue}</div>
                            <div className="text-xs mt-2 opacity-75">{stats.totalBills} bills</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8">
                        <div className="bg-gradient-to-br from-indigo-500 to-indigo-600 text-white rounded-lg shadow-lg p-6">
                            <div className="text-sm opacity-90 mb-1">Prescriptions</div>
                            <div className="text-4xl font-bold">{stats.totalPrescriptions}</div>
                            <div className="text-xs mt-2 opacity-75">
                                ✓ {stats.issuedPrescriptions} Issued | ⏳ {stats.pendingPrescriptions} Pending
                            </div>
                        </div>
                        <div className="bg-gradient-to-br from-teal-500 to-teal-600 text-white rounded-lg shadow-lg p-6">
                            <div className="text-sm opacity-90 mb-1">Bills Generated</div>
                            <div className="text-4xl font-bold">{stats.totalBills}</div>
                            <div className="text-xs mt-2 opacity-75">Registration + Pharmacy</div>
                        </div>
                    </div>

                    {/* Activity Log */}
                    <div className="bg-white rounded-lg shadow-lg p-6">
                        <h3 className="text-xl font-semibold mb-4 text-gray-800 border-b pb-2 flex items-center">
                            <span className="mr-2">📝</span>
                            Recent Activity Log
                        </h3>
                        <div className="space-y-2 max-h-[500px] overflow-y-auto">
                            {stats.recentActivity.length === 0 ? (
                                <div className="text-center py-8 text-gray-500">
                                    <div className="text-4xl mb-2">📋</div>
                                    <div>No activity yet</div>
                                </div>
                            ) : (
                                stats.recentActivity.map((activity, index) => (
                                    <div key={activity.logId || index} className="flex justify-between items-start p-4 bg-gray-50 rounded-lg border border-gray-200 hover:shadow-md transition-shadow">
                                        <div className="flex-1">
                                            <div className="font-semibold text-gray-800">{activity.action}</div>
                                            <div className="text-sm text-gray-600 mt-1">{activity.description}</div>
                                        </div>
                                        <div className="text-xs text-gray-500 whitespace-nowrap ml-4">
                                            {new Date(activity.timestamp).toLocaleString()}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // RENDER APP
        // ============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HospitalManagementSystem />);
    </script>
</body>
</html>
