<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMS Hospital — HMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --sims-navy: #003087;
            --sims-navy-dark: #001f5b;
            --sims-navy-light: #0047b3;
            --sims-red: #c8102e;
            --sims-red-light: #e8192c;
            --sims-gold: #c9a227;
            --sims-white: #ffffff;
            --sims-gray-light: #f4f6fb;
            --sims-gray: #e8ecf4;
            --sims-text: #1a2540;
            --sims-text-muted: #5a6a8a;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sims-gray-light);
            color: var(--sims-text);
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, .font-display { font-family: 'Outfit', sans-serif; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--sims-gray); }
        ::-webkit-scrollbar-thumb { background: var(--sims-navy); border-radius: 4px; }

        .sims-sidebar {
            width: var(--sidebar-w);
            background: var(--sims-navy-dark);
            min-height: 100vh;
            position: fixed;
            left: 0; top: 0;
            display: flex; flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 24px rgba(0,0,0,0.25);
        }

        .sims-logo-area {
            padding: 20px 16px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sims-logo-badge {
            display: flex; align-items: center; gap: 10px;
        }

        .sims-logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--sims-red), #ff4060);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(200,16,46,0.4);
            flex-shrink: 0;
        }

        .sims-logo-text { color: white; }
        .sims-logo-text .name { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
        .sims-logo-text .tagline { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 400; letter-spacing: 0.5px; }

        .sims-nav {
            flex: 1; padding: 16px 12px; overflow-y: auto;
        }

        .sims-nav-section {
            margin-bottom: 4px;
        }

        .sims-nav-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
            color: rgba(255,255,255,0.3); padding: 8px 12px 4px;
            text-transform: uppercase;
        }

        .sims-nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
            color: rgba(255,255,255,0.65); font-size: 13.5px; font-weight: 500;
            margin-bottom: 1px;
        }

        .sims-nav-item:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .sims-nav-item.active {
            background: var(--sims-red);
            color: white;
            box-shadow: 0 4px 12px rgba(200,16,46,0.35);
        }

        .sims-nav-item .nav-icon {
            width: 28px; height: 28px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
            background: rgba(255,255,255,0.07);
        }

        .sims-nav-item.active .nav-icon { background: rgba(255,255,255,0.2); }

        .nav-badge {
            margin-left: auto; background: var(--sims-gold);
            color: #1a1a1a; font-size: 10px; font-weight: 700;
            padding: 1px 7px; border-radius: 20px; min-width: 20px; text-align: center;
        }

        .sims-nav-item.active .nav-badge { background: rgba(255,255,255,0.3); color: white; }

        .sims-user-card {
            margin: 12px; padding: 12px;
            background: rgba(255,255,255,0.06);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
        }

        .sims-user-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: white;
            background: linear-gradient(135deg, var(--sims-navy-light), var(--sims-red));
            flex-shrink: 0;
        }

        .sims-main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .sims-topbar {
            background: white;
            height: 60px;
            display: flex; align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid var(--sims-gray);
            position: sticky; top: 0; z-index: 50;
            gap: 16px;
            box-shadow: 0 1px 8px rgba(0,48,135,0.06);
        }

        .sims-topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: 17px; font-weight: 700;
            color: var(--sims-navy-dark);
            flex: 1;
        }

        .sims-topbar-date {
            font-size: 12px; color: var(--sims-text-muted);
        }

        .sims-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--sims-gray);
            box-shadow: 0 2px 12px rgba(0,48,135,0.04);
        }

        .sims-card-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--sims-gray);
            display: flex; align-items: center; justify-content: space-between;
        }

        .sims-card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 15px; font-weight: 700;
            color: var(--sims-navy-dark);
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid var(--sims-gray);
            box-shadow: 0 2px 8px rgba(0,48,135,0.04);
            position: relative; overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .stat-card.navy::before { background: var(--sims-navy); }
        .stat-card.red::before { background: var(--sims-red); }
        .stat-card.gold::before { background: var(--sims-gold); }
        .stat-card.green::before { background: #10b981; }
        .stat-card.purple::before { background: #7c3aed; }
        .stat-card.teal::before { background: #0891b2; }

        .stat-number {
            font-family: 'Outfit', sans-serif;
            font-size: 32px; font-weight: 800;
            color: var(--sims-navy-dark);
            line-height: 1;
        }

        .stat-label {
            font-size: 12px; color: var(--sims-text-muted);
            font-weight: 500; margin-top: 4px;
        }

        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .btn-primary {
            background: var(--sims-navy);
            color: white;
            border: none; border-radius: 10px;
            padding: 9px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }

        .btn-primary:hover { background: var(--sims-navy-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,48,135,0.3); }

        .btn-red {
            background: var(--sims-red);
            color: white;
            border: none; border-radius: 10px;
            padding: 9px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }

        .btn-red:hover { background: var(--sims-red-light); transform: translateY(-1px); }

        .btn-outline {
            background: transparent;
            color: var(--sims-navy);
            border: 1.5px solid var(--sims-gray);
            border-radius: 10px;
            padding: 8px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }

        .btn-outline:hover { border-color: var(--sims-navy); background: var(--sims-gray-light); }

        .btn-green {
            background: #059669;
            color: white; border: none; border-radius: 10px;
            padding: 9px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }

        .btn-green:hover { background: #047857; transform: translateY(-1px); }

        .btn-sm { padding: 5px 12px !important; font-size: 12px !important; }

        .sims-input {
            width: 100%;
            border: 1.5px solid var(--sims-gray);
            border-radius: 10px;
            padding: 9px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--sims-text);
            background: white;
            transition: border-color 0.2s;
            outline: none;
        }

        .sims-input:focus { border-color: var(--sims-navy); box-shadow: 0 0 0 3px rgba(0,48,135,0.08); }
        .sims-input::placeholder { color: #aab4c8; }

        .sims-label {
            font-size: 11.5px; font-weight: 600;
            color: var(--sims-text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            display: block; margin-bottom: 5px;
        }

        .sims-table { width: 100%; border-collapse: collapse; }
        .sims-table th {
            background: var(--sims-gray-light);
            padding: 10px 14px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
            text-transform: uppercase; color: var(--sims-text-muted);
            text-align: left; border-bottom: 1px solid var(--sims-gray);
        }
        .sims-table td {
            padding: 11px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--sims-gray);
            color: var(--sims-text);
        }
        .sims-table tr:last-child td { border-bottom: none; }
        .sims-table tr:hover td { background: var(--sims-gray-light); }

        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 9px; border-radius: 20px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
        }
        .badge-navy { background: #e8eef8; color: var(--sims-navy); }
        .badge-red { background: #fdeaec; color: var(--sims-red); }
        .badge-green { background: #ecfdf5; color: #059669; }
        .badge-yellow { background: #fffbeb; color: #d97706; }
        .badge-purple { background: #f5f3ff; color: #7c3aed; }
        .badge-gray { background: #f3f4f6; color: #6b7280; }
        .badge-teal { background: #ecfeff; color: #0891b2; }
        .badge-orange { background: #fff7ed; color: #ea580c; }

        .sims-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,20,60,0.55); backdrop-filter: blur(3px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .sims-modal {
            background: white; border-radius: 18px;
            width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,20,60,0.3);
            animation: modalIn 0.25s ease;
        }

        .sims-modal-lg { max-width: 760px; }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .sims-modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--sims-gray);
            display: flex; align-items: center; justify-content: space-between;
        }

        .sims-modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 17px; font-weight: 700;
            color: var(--sims-navy-dark);
        }

        .sims-modal-body { padding: 20px 24px; }
        .sims-modal-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--sims-gray);
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .sims-alert {
            padding: 10px 14px; border-radius: 10px;
            font-size: 13px; display: flex; align-items: flex-start; gap: 8px;
            margin-bottom: 14px;
        }
        .sims-alert-error { background: #fdeaec; color: var(--sims-red); border-left: 3px solid var(--sims-red); }
        .sims-alert-success { background: #ecfdf5; color: #059669; border-left: 3px solid #059669; }
        .sims-alert-info { background: #e8eef8; color: var(--sims-navy); border-left: 3px solid var(--sims-navy); }
        .sims-alert-warning { background: #fffbeb; color: #d97706; border-left: 3px solid #d97706; }

        .login-bg {
            min-height: 100vh;
            background: var(--sims-navy-dark);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .login-bg::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(200,16,46,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,71,179,0.3) 0%, transparent 50%);
        }

        .login-card {
            background: white; border-radius: 20px;
            width: 100%; max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            position: relative; z-index: 1;
            overflow: hidden;
        }

        .login-header {
            background: var(--sims-navy-dark);
            padding: 32px 32px 24px;
            text-align: center;
            position: relative;
        }

        .login-header::after {
            content: '';
            position: absolute; bottom: -1px; left: 0; right: 0;
            height: 20px;
            background: white;
            border-radius: 20px 20px 0 0;
        }

        .login-body { padding: 24px 32px 32px; }

        .sims-content {
            padding: 24px 28px;
            flex: 1;
        }

        .page-header {
            margin-bottom: 20px;
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 16px;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px; font-weight: 800;
            color: var(--sims-navy-dark);
            line-height: 1.2;
        }

        .page-sub {
            font-size: 13px; color: var(--sims-text-muted);
            margin-top: 2px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }

        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--sims-gray);
            border-top-color: var(--sims-navy);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .activity-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--sims-gray);
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--sims-navy); flex-shrink: 0; margin-top: 5px;
        }

        .patient-chip {
            font-family: 'Outfit', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            background: var(--sims-navy-dark); color: white;
            padding: 2px 8px; border-radius: 6px; display: inline-block;
        }

        .sims-topbar-brand {
            display: flex; align-items: center; gap: 8px;
            padding: 0 16px;
            border-left: 1px solid var(--sims-gray);
            color: var(--sims-text-muted); font-size: 12px;
        }

        .role-chip {
            display: inline-block; padding: 4px 10px;
            border-radius: 7px; cursor: pointer;
            font-size: 11px; font-weight: 600;
            background: var(--sims-gray-light);
            color: var(--sims-text-muted);
            border: 1px solid var(--sims-gray);
            transition: all 0.15s; margin: 3px 2px;
        }
        .role-chip:hover { background: var(--sims-navy); color: white; border-color: var(--sims-navy); }

        .empty-state {
            text-align: center; padding: 48px 20px;
        }
        .empty-state-icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
        .empty-state-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; color: var(--sims-text-muted); }
        .empty-state-text { font-size: 13px; color: #aab4c8; margin-top: 4px; }

        .divider-text {
            display: flex; align-items: center; gap: 10px;
            margin: 16px 0 12px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase; color: var(--sims-text-muted);
        }
        .divider-text::before, .divider-text::after {
            content: ''; flex: 1; height: 1px; background: var(--sims-gray);
        }

        .section-accent {
            width: 36px; height: 3px; background: var(--sims-red);
            border-radius: 2px; margin-bottom: 8px;
        }

        .sims-tabs {
            display: flex; gap: 4px;
            background: var(--sims-gray-light);
            border-radius: 12px; padding: 4px;
            margin-bottom: 18px;
        }
        .sims-tab {
            flex: 1; text-align: center;
            padding: 7px 12px; border-radius: 9px;
            font-size: 12.5px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            color: var(--sims-text-muted);
        }
        .sims-tab.active {
            background: white; color: var(--sims-navy);
            box-shadow: 0 1px 6px rgba(0,48,135,0.12);
        }

        .vital-box {
            background: var(--sims-gray-light);
            border-radius: 10px; padding: 10px;
            text-align: center; border: 1px solid var(--sims-gray);
        }
        .vital-value { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; color: var(--sims-navy-dark); }
        .vital-label { font-size: 10px; color: var(--sims-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        @media print {
            .sims-sidebar, .sims-topbar, .btn-primary, .btn-red, .btn-outline { display: none !important; }
            .sims-main { margin-left: 0 !important; }
        }

        @media (max-width: 768px) {
            .sims-sidebar { transform: translateX(-100%); }
            .sims-main { margin-left: 0; }
            .grid-4 { grid-template-columns: 1fr 1fr; }
            .grid-6 { grid-template-columns: repeat(3, 1fr); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-wrap {
            position: relative; flex: 1; max-width: 320px;
        }
        .search-wrap input {
            width: 100%;
            border: 1.5px solid var(--sims-gray);
            border-radius: 10px;
            padding: 8px 13px 8px 36px;
            font-size: 13px; outline: none;
            background: var(--sims-gray-light);
            transition: all 0.2s;
        }
        .search-wrap input:focus {
            border-color: var(--sims-navy);
            background: white;
        }
        .search-icon {
            position: absolute; left: 11px; top: 50%;
            transform: translateY(-50%);
            color: var(--sims-text-muted); font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const DEPT_USERS = {

            static loginDoctor(doctorName, password) {
                const doc = DOCTORS.find(d => d.name === doctorName && d.password === password.trim());
                if (doc) {
                    this.currentUser = { username: doctorName, role: 'doctor', name: doctorName, dept: doc.specialization, specialization: doc.specialization };
                    sessionStorage.setItem('simsUser', JSON.stringify(this.currentUser));
                    return { success: true, user: this.currentUser };
                }
                return { success: false, error: 'Incorrect password for this doctor' };
            }

            static loginDept(u, p) {
                const user = Object.values(DEPT_USERS).find(x => x.username === u.trim() && x.password === p.trim());
                if (user) { this.currentUser = {...user}; sessionStorage.setItem('simsUser', JSON.stringify(this.currentUser)); return { success: true, user: this.currentUser }; }
                return { success: false, error: 'Invalid username or password' };
            }

            static logout() { this.currentUser = null; sessionStorage.removeItem('simsUser'); }
            static isAuthenticated() {
                if (this.currentUser) return true;
                const s = sessionStorage.getItem('simsUser');
                if (s) { try { this.currentUser = JSON.parse(s); return true; } catch(e) {} }
                return false;
            }
            static getCurrentUser() {
                if (!this.currentUser) { const s = sessionStorage.getItem('simsUser'); if (s) try { this.currentUser = JSON.parse(s); } catch(e) {} }
                return this.currentUser;
            }

                            <div className="patient-chip" style={{ fontSize:14, padding:'4px 16px', marginBottom:16 }}>{newPatient.patient.patientId}</div>
                            <div style={{ background:'var(--sims-gray-light)', borderRadius:12, padding:16, textAlign:'left', marginBottom:16 }}>
                                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}><span style={{ color:'var(--sims-text-muted)', fontSize:12 }}>Name</span><strong>{newPatient.patient.firstName} {newPatient.patient.lastName}</strong></div>

                            </div>
                            <button className="btn-primary" style={{ width:'100%', justifyContent:'center' }} onClick={()=>setModal(null)}>Done</button>

                    ) : (<>
                        {err && <Alert type="error">{err}</Alert>}
                        <div className="divider-text">Personal Information</div>
                        <div className="grid-2">
                            <FormField label="First Name" required><input className="sims-input" value={form.firstName||''} onChange={e=>f('firstName',e.target.value)} placeholder="First name" /></FormField>
                            <FormField label="Last Name"><input className="sims-input" value={form.lastName||''} onChange={e=>f('lastName',e.target.value)} placeholder="Last name" /></FormField>
                            <FormField label="Age" required><input className="sims-input" type="number" value={form.age||''} onChange={e=>f('age',e.target.value)} placeholder="Age in years" /></FormField>
                            <FormField label="Gender" required>
                                <select className="sims-input" value={form.gender||'Male'} onChange={e=>f('gender',e.target.value)}>
                                    <option>Male</option><option>Female</option><option>Other</option>
                                </select>
                            </FormField>
                            <FormField label="Blood Group">
                                <select className="sims-input" value={form.bloodGroup||'Unknown'} onChange={e=>f('bloodGroup',e.target.value)}>
                                    {BLOOD_GROUPS.map(b => <option key={b}>{b}</option>)}
                                </select>
                            </FormField>
                            <FormField label="Phone"><input className="sims-input" value={form.phone||''} onChange={e=>f('phone',e.target.value)} placeholder="+91 XXXXX XXXXX" /></FormField>
                            <FormField label="Emergency Contact"><input className="sims-input" value={form.emergencyContact||''} onChange={e=>f('emergencyContact',e.target.value)} placeholder="Name & Number" /></FormField>
                            <FormField label="Address"><input className="sims-input" value={form.address||''} onChange={e=>f('address',e.target.value)} placeholder="Address" /></FormField>
                        </div>
                        <div className="divider-text">Clinical</div>

                        <FormField label="Assign Doctor" required>

                                {doctors.map(d => <option key={d.doctorId} value={d.doctorId}>Dr. {d.name} — {d.specialization}</option>)}

                        <div className="divider-text">Insurance & Admission</div>

        function DoctorPortal() {
            const [patients, setPatients] = useState([]);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(true);
            const [selectedPat, setSelectedPat] = useState(null);
            const [encounters, setEncounters] = useState([]);
            const [labTests, setLabTests] = useState([]);
            const [modal, setModal] = useState(null);
            const [form, setForm] = useState({});
            const [labForm, setLabForm] = useState({ tests:[], urgency:'ROUTINE' });
            const [rxForm, setRxForm] = useState({ medicines:[] });
            const [err, setErr] = useState('');
            const [success, setSuccess] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const [currentEnc, setCurrentEnc] = useState(null);

            useEffect(() => {
                API.getPatients().then(setPatients).finally(()=>setLoading(false));
            }, []);

            const selectPatient = async (p) => {
                setSelectedPat(p);
                setCurrentEnc(null);
                const [encs, labs] = await Promise.all([
                    API.getEncountersByPat(p.patientId),
                    API.getLabTests('?').catch(()=>[])
                ]);
                setEncounters(encs);
                setLabTests(labs.filter(l => l.patientId === p.patientId));
            };

            const f = (k, v) => setForm(prev => ({ ...prev, [k]: v }));
            const fv = (k, v) => setForm(prev => ({ ...prev, vitals: { ...(prev.vitals||{}), [k]: v } }));

            const submitEncounter = async () => {
                setErr(''); setSubmitting(true);
                try {
                    const enc = await API.addEncounter({ ...form, patientId: selectedPat.patientId, specialization: form.specialization || AuthService.getCurrentUser()?.specialization || '' });
                    setCurrentEnc(enc);
                    setSuccess('Encounter created! Now order labs or write prescription.');
                    const encs = await API.getEncountersByPat(selectedPat.patientId);
                    setEncounters(encs);
                    setModal(null);
                } catch(e) { setErr(e.message); }
                setSubmitting(false);
            };

            const toggleLabTest = (t) => {
                setLabForm(prev => {
                    const exists = prev.tests.find(x => x.testName === t.name);
                    return exists
                        ? { ...prev, tests: prev.tests.filter(x => x.testName !== t.name) }
                        : { ...prev, tests: [...prev.tests, { testName: t.name, testCategory: t.category }] };
                });
            };

            const submitLab = async () => {
                if (labForm.tests.length === 0) { setErr('Select at least one test'); return; }
                setErr(''); setSubmitting(true);
                try {
                    await API.orderLab({
                        encounterId: currentEnc?.encounterId || encounters[0]?.encounterId,
                        patientId: selectedPat.patientId,
                        patientName: `${selectedPat.firstName} ${selectedPat.lastName}`,
                        tests: labForm.tests.map(t => ({ ...t, urgency: labForm.urgency }))
                    });
                    setSuccess(`${labForm.tests.length} test(s) ordered successfully`);
                    setModal(null); setLabForm({ tests:[], urgency:'ROUTINE' });
                } catch(e) { setErr(e.message); }
                setSubmitting(false);
            };

            const addMedicine = () => setRxForm(prev => ({ ...prev, medicines: [...prev.medicines, { medicineName:'', dosage:'', frequency:'', duration:'', quantity:1, price:50, route:'Oral' }] }));
            const updateMed = (i, k, v) => setRxForm(prev => { const m = [...prev.medicines]; m[i] = { ...m[i], [k]: v }; return { ...prev, medicines: m }; });
            const removeMed = (i) => setRxForm(prev => ({ ...prev, medicines: prev.medicines.filter((_,idx)=>idx!==i) }));

            const submitRx = async () => {
                if (rxForm.medicines.length === 0) { setErr('Add at least one medicine'); return; }
                setErr(''); setSubmitting(true);
                try {
                    await API.addRx({
                        encounterId: currentEnc?.encounterId || encounters[0]?.encounterId,
                        patientId: selectedPat.patientId,
                        patientName: `${selectedPat.firstName} ${selectedPat.lastName}`,
                        doctorName: AuthService.getCurrentUser()?.name || 'Doctor',
                        medicines: rxForm.medicines
                    });
                    setSuccess('Prescription created! Patient can collect from Pharmacy.');
                    setModal(null); setRxForm({ medicines:[] });
                } catch(e) { setErr(e.message); }
                setSubmitting(false);
            };

            const filtered = patients.filter(p =>
                `${p.firstName} ${p.lastName} ${p.patientId}`.toLowerCase().includes(search.toLowerCase())
            );

            return <div className="fade-in" style={{ display:'grid', gridTemplateColumns:'300px 1fr', gap:20, height:'calc(100vh - 120px)' }}>
                <div>
                    <div style={{ marginBottom:12 }}>
                        <div style={{ fontFamily:"'Outfit',sans-serif", fontSize:16, fontWeight:700, color:'var(--sims-navy-dark)', marginBottom:10 }}>Select Patient</div>
                        <div className="search-wrap" style={{ maxWidth:'100%' }}>
                            <span className="search-icon">🔍</span>
                            <input placeholder="Search patients..." value={search} onChange={e=>setSearch(e.target.value)} />
                        </div>
                    </div>
                    <div style={{ overflowY:'auto', height:'calc(100% - 80px)', display:'flex', flexDirection:'column', gap:8 }}>
                        {loading ? <Spinner /> : filtered.length === 0 ? <EmptyState icon="🔍" title="No patients found" /> :
                            filtered.map(p => (
                                <div key={p._id} onClick={()=>selectPatient(p)}
                                    style={{ background: selectedPat?.patientId===p.patientId ? 'var(--sims-navy-dark)' : 'white', borderRadius:12, padding:'12px 14px', cursor:'pointer', border:`1.5px solid ${selectedPat?.patientId===p.patientId ? 'var(--sims-navy-dark)':'var(--sims-gray)'}`, transition:'all 0.2s' }}>
                                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
                                        <div style={{ fontWeight:600, fontSize:13.5, color: selectedPat?.patientId===p.patientId ? 'white':'var(--sims-text)' }}>{p.firstName} {p.lastName}</div>
                                        <span className={`badge ${p.isIPD ? 'badge-orange':'badge-navy'}`} style={{ fontSize:10 }}>{p.isIPD?'IPD':'OPD'}</span>
                                    </div>
                                    <div style={{ fontSize:11, color: selectedPat?.patientId===p.patientId ? 'rgba(255,255,255,0.6)':'var(--sims-text-muted)' }}>{p.patientId} · {p.age}y {p.gender}</div>
                                    <div style={{ fontSize:11, color: selectedPat?.patientId===p.patientId ? 'rgba(255,255,255,0.5)':'#aab4c8', marginTop:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.chiefComplaint}</div>
                                </div>
                            ))
                        }
                    </div>
                </div>

                <div style={{ overflowY:'auto' }}>
                    {!selectedPat ? (
                        <div className="sims-card" style={{ height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            <EmptyState icon="👆" title="Select a patient from the left" text="Patient details, encounters and actions will appear here" />
                        </div>
                    ) : (<>
                        <div className="sims-card" style={{ marginBottom:16, padding:'16px 20px' }}>
                            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
                                <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                                    <div style={{ width:52, height:52, borderRadius:14, background:'linear-gradient(135deg, var(--sims-navy), var(--sims-navy-light))', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:'white', fontWeight:700 }}>
                                        {selectedPat.firstName[0]}
                                    </div>
                                    <div>
                                        <div style={{ fontFamily:"'Outfit',sans-serif", fontSize:18, fontWeight:800, color:'var(--sims-navy-dark)' }}>{selectedPat.firstName} {selectedPat.lastName}</div>
                                        <div style={{ display:'flex', gap:8, marginTop:4 }}>
                                            <span className="patient-chip">{selectedPat.patientId}</span>

        function Laboratory() {
            const [tests, setTests] = useState([]);
            const [filter, setFilter] = useState('PENDING');
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [modal, setModal] = useState(null);
            const [selected, setSelected] = useState(null);
            const [result, setResult] = useState('');
            const [remarks, setRemarks] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const [err, setErr] = useState('');
            const [success, setSuccess] = useState('');

            const load = useCallback(() => {
                setLoading(true);
                API.getLabTests(filter !== 'ALL' ? `?status=${filter}` : '').then(setTests).finally(() => setLoading(false));
            }, [filter]);

            useEffect(() => { load(); }, [load]);

            const submitResult = async () => {
                if (!result.trim()) { setErr('Result is required'); return; }
                setErr(''); setSubmitting(true);
                try {
                    await API.submitResult(selected.testId, { result, remarks });
                    setSuccess('Result submitted successfully');
                    load(); setModal(null);
                } catch(e) { setErr(e.message); }
                setSubmitting(false);
            };

            const filtered = tests.filter(t =>
                `${t.testName} ${t.patientId} ${t.testId}`.toLowerCase().includes(search.toLowerCase())
            );

            return <div className="fade-in">
                <div className="page-header">
                    <div><div className="section-accent"></div><div className="page-title">Laboratory</div><div className="page-sub">Test queue and result entry</div></div>
                    <button className="btn-outline" onClick={load}>↻ Refresh</button>
                </div>

                <div style={{ display:'flex', gap:12, marginBottom:16, flexWrap:'wrap', alignItems:'center' }}>
                    <div className="sims-tabs" style={{ marginBottom:0, flex:1 }}>
                        {['PENDING','PROCESSING','COMPLETED','ALL'].map(s => (
                            <div key={s} className={`sims-tab ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</div>
                        ))}
                    </div>
                    <div className="search-wrap" style={{ maxWidth:240 }}>
                        <span className="search-icon">🔍</span>
                        <input placeholder="Search tests..." value={search} onChange={e=>setSearch(e.target.value)} />
                    </div>
                </div>

                {loading ? <Spinner /> : (
                    filtered.length === 0 ? <div className="sims-card"><EmptyState icon="🧪" title={`No ${filter.toLowerCase()} tests`} /></div> :
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                        {filtered.map(t => (
                            <div key={t._id} className="sims-card" style={{ padding:'14px 18px' }}>
                                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:8 }}>
                                    <div style={{ flex:1 }}>
                                        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                                            <span style={{ fontWeight:700, fontSize:14 }}>{t.testName}</span>
                                            <StatusBadge status={t.urgency} />
                                            <StatusBadge status={t.status} />
                                        </div>
                                        <div style={{ display:'flex', gap:16, marginTop:6, fontSize:12, color:'var(--sims-text-muted)' }}>
                                            <span><span className="patient-chip" style={{ fontSize:10 }}>{t.patientId}</span></span>
                                            {t.patientName && <span>👤 {t.patientName}</span>}
                                            <span>🕐 {fmt.datetime(t.orderedAt)}</span>
                                        </div>
                                        {t.result && <div style={{ marginTop:6, background:'white', borderRadius:7, padding:'6px 10px', fontSize:12.5, border:'1px solid var(--sims-gray)' }}>
                                            <strong>Result:</strong> {t.result}{t.remarks && <> · <em>{t.remarks}</em></>}
                                        </div>}
                                    </div>
                                    {t.status !== 'COMPLETED' && (
                                        <button className="btn-green btn-sm" onClick={()=>{ setSelected(t); setResult(''); setRemarks(''); setErr(''); setModal('result'); }}>✓ Enter Result</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                <Modal open={modal==='result'} onClose={()=>setModal(null)} title={`Enter Result — ${selected?.testName}`}
                    footer={<><button className="btn-outline" onClick={()=>setModal(null)}>Cancel</button><button className="btn-green" onClick={submitResult} disabled={submitting}>{submitting?'Submitting...':'✓ Submit Result'}</button></>}>
                    {err && <Alert type="error">{err}</Alert>}
                    <FormField label="Result" required><textarea className="sims-input" rows={3} value={result} onChange={e=>setResult(e.target.value)} placeholder="Enter test result..." style={{ resize:'vertical' }} autoFocus /></FormField>
                    <FormField label="Remarks"><input className="sims-input" value={remarks} onChange={e=>setRemarks(e.target.value)} placeholder="Normal / Abnormal..." /></FormField>
                </Modal>
            </div>;
        }

            const [filter, setFilter] = useState('PENDING');
            const [loading, setLoading] = useState(true);
            const [modal, setModal] = useState(null);
            const [selected, setSelected] = useState(null);
            const [meds, setMeds] = useState([]);
            const [submitting, setSubmitting] = useState(false);
            const [err, setErr] = useState('');
            const [success, setSuccess] = useState('');

            const load = () => {
                setLoading(true);
                API.getRx(filter !== 'ALL' ? `?status=${filter}` : '').then(setRxList).finally(()=>setLoading(false));
            };

            useEffect(() => { load(); }, [filter]);

            const openIssue = (rx) => { setSelected(rx); setMeds(rx.medicines.map(m => ({ ...m }))); setErr(''); setModal('issue'); };

            const issue = async () => {

                try {
                    const res = await API.issueRx(selected.prescriptionId, meds);
                    setSuccess(`Medicines dispensed! Bill: ${fmt.inr(res.bill.totalAmount)}`);
                    load(); setModal(null);
                } catch(e) { setErr(e.message); }
                setSubmitting(false);
            };

                    <button className="btn-outline" onClick={load}>↻ Refresh</button>

                {success && <Alert type="success">{success}</Alert>}

                <div className="sims-tabs">
                    {['PENDING','ISSUED','ALL'].map(s => <div key={s} className={`sims-tab ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</div>)}

                {loading ? <Spinner /> : rxList.length === 0

                                        <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
                                            <span style={{ fontFamily:"'Outfit',sans-serif", fontSize:12, fontWeight:700, color:'var(--sims-navy)' }}>{rx.prescriptionId}</span>
                                            <StatusBadge status={rx.status} />
                                        </div>
                                        <div style={{ display:'flex', gap:16, fontSize:12, color:'var(--sims-text-muted)', marginBottom:8 }}>
                                            <span><span className="patient-chip" style={{ fontSize:10 }}>{rx.patientId}</span> {rx.patientName}</span>
                                            <span>Dr. {rx.doctorName}</span>
                                        </div>
                                        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                                            {rx.medicines.map((m,i) => (

                                    {rx.status === 'PENDING' && <button className="btn-green btn-sm" onClick={()=>openIssue(rx)}>Dispense →</button>}
                                </div>
                            </div>
                        ))}
                    </div>

                <Modal open={modal==='issue'} onClose={()=>setModal(null)} title="Dispense Medicines" large
                    footer={<><button className="btn-outline" onClick={()=>setModal(null)}>Cancel</button><button className="btn-green" onClick={issue} disabled={submitting}>{submitting?'Dispensing...':'✓ Dispense & Bill'}</button></>}>
                    {err && <Alert type="error">{err}</Alert>}
                    {selected && <>
                        <div style={{ background:'var(--sims-gray-light)', borderRadius:10, padding:12, marginBottom:14, fontSize:12 }}>
                            <strong>{selected.patientName}</strong> · <span className="patient-chip" style={{ fontSize:10 }}>{selected.patientId}</span>

                                <div style={{ fontWeight:600, fontSize:14, marginBottom:8 }}>{m.medicineName}</div>
                                <div className="grid-3" style={{ gap:8 }}>
                                    <FormField label="Dosage"><input className="sims-input" value={m.dosage||''} onChange={e=>{const n=[...meds];n[i].dosage=e.target.value;setMeds(n);}} /></FormField>
                                    <FormField label="Quantity"><input className="sims-input" type="number" value={m.quantity||1} onChange={e=>{const n=[...meds];n[i].quantity=parseInt(e.target.value)||1;setMeds(n);}} min={1} /></FormField>
                                    <FormField label="Price (₹)"><input className="sims-input" type="number" value={m.price||50} onChange={e=>{const n=[...meds];n[i].price=parseFloat(e.target.value)||0;setMeds(n);}} /></FormField>

        function Billing() {
            const [bills, setBills] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('ALL');
            const [modal, setModal] = useState(null);
            const [selected, setSelected] = useState(null);
            const [payMode, setPayMode] = useState('CASH');
            const [discount, setDiscount] = useState(0);
            const [submitting, setSubmitting] = useState(false);
            const [success, setSuccess] = useState('');
            const [err, setErr] = useState('');

            const load = () => { setLoading(true); API.getBills().then(setBills).finally(()=>setLoading(false)); };
            useEffect(()=>{ load(); }, []);

            const filtered = bills.filter(b => {
                const matchSearch = `${b.billId} ${b.patientId} ${b.patientName}`.toLowerCase().includes(search.toLowerCase());
                const matchFilter = filter === 'ALL' || b.paymentStatus === filter;
                return matchSearch && matchFilter;
            });

            const totalRevenue = bills.filter(b=>b.paymentStatus==='PAID').reduce((s,b)=>(b.netAmount||b.totalAmount)+s, 0);
            const pendingRevenue = bills.filter(b=>b.paymentStatus!=='PAID').reduce((s,b)=>b.totalAmount+s, 0);

            const pay = async () => {
                setErr(''); setSubmitting(true);
                try {
                    await API.payBill(selected.billId, { paymentMode: payMode, discount: parseFloat(discount)||0 });
                    setSuccess('Payment recorded!');
                    load(); setModal(null);
                } catch(e) { setErr(e.message); }
                setSubmitting(false);
            };

            return <div className="fade-in">
                <div className="page-header">
                    <div><div className="section-accent"></div><div className="page-title">Billing</div><div className="page-sub">Payments, invoices & financial records</div></div>
                    <button className="btn-outline" onClick={load}>↻ Refresh</button>
                </div>

                {success && <Alert type="success">{success}</Alert>}

                <div className="grid-3" style={{ marginBottom:20 }}>
                    <div className="stat-card navy"><div style={{ display:'flex', justifyContent:'space-between' }}><div><div className="stat-number">{fmt.inr(totalRevenue)}</div><div className="stat-label">Revenue Collected</div></div><div className="stat-icon" style={{ background:'#e8eef8', fontSize:22 }}>💰</div></div></div>
                    <div className="stat-card red"><div style={{ display:'flex', justifyContent:'space-between' }}><div><div className="stat-number">{fmt.inr(pendingRevenue)}</div><div className="stat-label">Outstanding</div></div><div className="stat-icon" style={{ background:'#fdeaec', fontSize:22 }}>⏳</div></div></div>
                    <div className="stat-card gold"><div style={{ display:'flex', justifyContent:'space-between' }}><div><div className="stat-number">{bills.length}</div><div className="stat-label">Total Bills</div></div><div className="stat-icon" style={{ background:'#fffbeb', fontSize:22 }}>🧾</div></div></div>
                </div>

                <div style={{ display:'flex', gap:12, marginBottom:16, flexWrap:'wrap' }}>
                    <div className="sims-tabs" style={{ marginBottom:0, flex:1 }}>
                        {['ALL','PENDING','PAID'].map(s => <div key={s} className={`sims-tab ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</div>)}
                    </div>
                    <div className="search-wrap" style={{ maxWidth:280 }}>
                        <span className="search-icon">🔍</span>
                        <input placeholder="Search bills..." value={search} onChange={e=>setSearch(e.target.value)} />
                    </div>
                </div>

                {loading ? <Spinner /> : (
                    <div className="sims-card">
                        {filtered.length === 0 ? <EmptyState icon="🧾" title="No bills found" /> :
                            <div style={{ overflowX:'auto' }}>
                                <table className="sims-table">
                                    <thead><tr><th>Bill ID</th><th>Patient</th><th>Type</th><th>Amount</th><th>Status</th><th>Mode</th><th>Date</th><th></th></tr></thead>
                                    <tbody>
                                        {filtered.map(b => (
                                            <tr key={b._id}>
                                                <td style={{ fontFamily:"'Outfit',sans-serif", fontSize:11, color:'var(--sims-navy)' }}>{b.billId}</td>
                                                <td><div style={{ fontWeight:600, fontSize:13 }}>{b.patientName || '—'}</div><span className="patient-chip" style={{ fontSize:10 }}>{b.patientId}</span></td>
                                                <td><span className="badge badge-navy">{b.type}</span></td>
                                                <td style={{ fontFamily:"'Outfit',sans-serif", fontWeight:700 }}>{fmt.inr(b.netAmount||b.totalAmount)}</td>
                                                <td><StatusBadge status={b.paymentStatus} /></td>
                                                <td style={{ fontSize:12 }}>{b.paymentMode || '—'}</td>
                                                <td style={{ fontSize:11.5, color:'var(--sims-text-muted)' }}>{fmt.date(b.createdAt)}</td>
                                                <td>{b.paymentStatus !== 'PAID' && <button className="btn-green btn-sm" onClick={()=>{ setSelected(b); setPayMode('CASH'); setDiscount(0); setErr(''); setModal('pay'); }}>Pay</button>}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        }
                    </div>
                )}

                <Modal open={modal==='pay'} onClose={()=>setModal(null)} title="Process Payment"
                    footer={<><button className="btn-outline" onClick={()=>setModal(null)}>Cancel</button><button className="btn-green" onClick={pay} disabled={submitting}>{submitting?'Processing...':'✓ Confirm Payment'}</button></>}>
                    {err && <Alert type="error">{err}</Alert>}
                    {selected && <>
                        <div style={{ background:'var(--sims-gray-light)', borderRadius:12, padding:14, marginBottom:14 }}>
                            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}><span style={{ fontSize:12, color:'var(--sims-text-muted)' }}>Patient</span><strong>{selected.patientName} ({selected.patientId})</strong></div>
                            <div style={{ display:'flex', justifyContent:'space-between', borderTop:'2px solid var(--sims-gray)', paddingTop:8, marginTop:6 }}><span style={{ fontWeight:700 }}>Total</span><span style={{ fontFamily:"'Outfit',sans-serif", fontSize:18, fontWeight:800, color:'var(--sims-navy-dark)' }}>{fmt.inr(selected.totalAmount)}</span></div>
                        </div>
                        <FormField label="Discount (₹)"><input className="sims-input" type="number" value={discount} onChange={e=>setDiscount(e.target.value)} min={0} /></FormField>
                        <FormField label="Payment Mode">
                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                                {['CASH','CARD','UPI','INSURANCE'].map(m => (
                                    <div key={m} onClick={()=>setPayMode(m)} style={{ padding:'10px', borderRadius:10, border:`2px solid ${payMode===m?'var(--sims-navy)':'var(--sims-gray)'}`, background:payMode===m?'var(--sims-navy)':'white', color:payMode===m?'white':'var(--sims-text)', textAlign:'center', cursor:'pointer', fontSize:13, fontWeight:600, transition:'all 0.2s' }}>
                                        {{'CASH':'💵 Cash','CARD':'💳 Card','UPI':'📱 UPI','INSURANCE':'🏦 Insurance'}[m]}
                                    </div>
                                ))}
                            </div>
                        </FormField>
                        <div style={{ textAlign:'right', fontFamily:"'Outfit',sans-serif", fontSize:20, fontWeight:800, color:'#059669', marginTop:6 }}>
                            Net Payable: {fmt.inr(selected.totalAmount - (parseFloat(discount)||0))}
                        </div>
                    </>}
                </Modal>
            </div>;
        }

        function App() {
            const [user, setUser] = useState(null);
            const [module, setModule] = useState(null);
            const [badges, setBadges] = useState({ lab:0, pharmacy:0 });

            useEffect(()=>{
                if (AuthService.isAuthenticated()) {
                    const u = AuthService.getCurrentUser();
                    setUser(u);
                    setModule(u.role === 'admin' ? 'dashboard' : u.role);
                }
            }, []);

            useEffect(()=>{
                const refresh = () => {
                    Promise.all([API.getLabTests('?status=PENDING'), API.getRx('?status=PENDING')])
                        .then(([labs, rx]) => setBadges({ lab: labs.length, pharmacy: rx.length })).catch(()=>{});
                };
                refresh();
                const id = setInterval(refresh, 90000);
                return () => clearInterval(id);
            }, []);

            const handleLogin = (u) => { setUser(u); setModule(u.role === 'admin' ? 'dashboard' : u.role); };
            const handleLogout = () => { AuthService.logout(); setUser(null); setModule(null); };

            if (!user) return <LoginPage onLogin={handleLogin} />;

            const moduleMap = {
                dashboard: { title:'Admin Dashboard', sub:'SIMS Hospital Overview', comp:<Dashboard /> },
                reception: { title:'Reception', sub:'Patient Registration & Doctor Management', comp:<Reception /> },
                doctor:    { title:'Doctor Portal', sub:'Encounters, Lab Orders & Prescriptions', comp:<DoctorPortal /> },
                lab:       { title:'Laboratory', sub:'Test Queue & Result Entry', comp:<Laboratory /> },
                pharmacy:  { title:'Pharmacy', sub:'Prescription Dispensing', comp:<Pharmacy /> },
                billing:   { title:'Billing Department', sub:'Payments & Financial Records', comp:<Billing /> },
            };

            const current = moduleMap[module] || moduleMap.reception;

            return <div style={{ display:'flex' }}>
                <Sidebar active={module} onNav={setModule} user={user} onLogout={handleLogout} badges={badges} />
                <div className="sims-main">
                    <TopBar title={current.title} subtitle={current.sub} user={user} />
                    <div className="sims-content">{current.comp}</div>
                </div>
            </div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
