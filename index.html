        // ============================================
        // DOCTOR MODULE
        // DOCTOR MODULE
        // ============================================
        function DoctorModule() {
            const [step, setStep] = useState(1);
            const [patients, setPatients] = useState([]);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [doctorName, setDoctorName] = useState('');
            const [diagnosis, setDiagnosis] = useState('');
            const [notes, setNotes] = useState('');
            const [labTests, setLabTests] = useState([]);
            const [medicines, setMedicines] = useState([]);
            const [message, setMessage] = useState(null);
            const [encounters, setEncounters] = useState([]);
            const [selectedEncounter, setSelectedEncounter] = useState(null);
            const [encounterTests, setEncounterTests] = useState([]);
            const [loading, setLoading] = useState(false);

            const [doctors, setDoctors] = useState([]);
            
            useEffect(() => {
                loadDoctors();
            }, [patients]);
            
            const loadDoctors = async () => {
                const allDoctors = await DoctorManagementService.getAllDoctors();
                setDoctors(allDoctors);
            };
            const availableTests = [
                'Complete Blood Count (CBC)',
                'Blood Sugar (Fasting)',
                'Blood Sugar (PP)',
                'Lipid Profile',
                'Liver Function Test (LFT)',
                'Kidney Function Test (KFT)',
                'Thyroid Profile (T3, T4, TSH)',
                'Urine Analysis',
                'X-Ray Chest',
                'ECG',
                'Hemoglobin A1c',
                'Vitamin D',
                'Vitamin B12'
            ];

            useEffect(() => {
                loadPatients();
            }, []);

            const loadPatients = async () => {
                const allPatients = await PatientService.getAllPatients();
                setPatients(allPatients.sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt)));
            };

            const loadPatientEncounters = async (patientId) => {
                const patientEncounters = await DoctorService.getEncountersByPatient(patientId);
                setEncounters(patientEncounters.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            };

            const loadEncounterTests = async (encounterId) => {
                const tests = await DoctorService.getLabTestsByEncounter(encounterId);
                setEncounterTests(tests);
            };

            const handlePatientSelect = (patient) => {
                setSelectedPatient(patient);
                loadPatientEncounters(patient.patientId);
                setStep(2);
                setMessage(null);
            };

            const addLabTest = (testName) => {
                if (!labTests.find(t => t.testName === testName)) {
                    setLabTests([...labTests, { testName }]);
                }
            };

            const removeLabTest = (testName) => {
                setLabTests(labTests.filter(t => t.testName !== testName));
            };

            const addMedicine = () => {
                setMedicines([...medicines, { medicineName: '', dosage: '', duration: '', quantity: 1, price: 50 }]);
            };

            const updateMedicine = (index, field, value) => {
                const updated = [...medicines];
                updated[index][field] = value;
                setMedicines(updated);
            };

            const removeMedicine = (index) => {
                setMedicines(medicines.filter((_, i) => i !== index));
            };

            const handleSubmit = async () => {
                if (!doctorName || !diagnosis) {
                    setMessage({ type: 'error', text: '❌ Please select doctor and enter diagnosis' });
                    return;
                }

                if (labTests.length === 0 && medicines.length === 0) {
                    setMessage({ type: 'error', text: '❌ Please order at least one lab test or prescribe at least one medicine' });
                    return;
                }

                setLoading(true);
                try {
                    // Create encounter
                    const encounter = await DoctorService.createEncounter({
                        patientId: selectedPatient.patientId,
                        doctorName,
                        diagnosis,
                        notes
                    });

                    // Order lab tests
                    if (labTests.length > 0) {
                        await DoctorService.orderLabTests(encounter.encounterId, selectedPatient.patientId, labTests);
                    }

                    // Create prescription
                    const validMedicines = medicines.filter(m => m.medicineName && m.dosage);
                    if (validMedicines.length > 0) {
                        await DoctorService.createPrescription({
                            encounterId: encounter.encounterId,
                            patientId: selectedPatient.patientId,
                            medicines: validMedicines
                        });
                    }

                    setMessage({ 
                        type: 'success', 
                        text: `✅ Encounter created successfully!\n\n• Encounter ID: ${encounter.encounterId}\n• Lab Tests Ordered: ${labTests.length}\n• Medicines Prescribed: ${validMedicines.length}\n\nData is now available in Lab and Pharmacy modules.` 
                    });

                    // Reset form
                    setDoctorName('');
                    setDiagnosis('');
                    setNotes('');
                    setLabTests([]);
                    setMedicines([]);
                    setTimeout(() => {
                        setStep(1);
                        setSelectedPatient(null);
                        setMessage(null);
                    }, 3000);
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Failed to create encounter: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            const viewEncounter = async (encounter) => {
                if (selectedEncounter?.encounterId === encounter.encounterId) {
                    setSelectedEncounter(null);
                    setEncounterTests([]);
                } else {
                    setSelectedEncounter(encounter);
                    await loadEncounterTests(encounter.encounterId);
                }
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="hms-page-title">
                        <span className="mr-3">⚕️</span>
                        Doctor Consultation
                    </h2>

                    {message && (
                        <div className={`mb-6 p-4 rounded-lg shadow-md ${message.type === 'success' ? 'bg-green-50 border-l-4 border-green-500 text-green-800' : 'bg-red-50 border-l-4 border-red-500 text-red-800'}`}>
                            <div className="font-medium whitespace-pre-line">{message.text}</div>
                        </div>
                    )}

                    {/* Step 1: Select Patient */}
                    {step === 1 && (
                        <div className="hms-card">
                            <h3 className="hms-card-title">
                                Step 1: Select Patient for Consultation
                            </h3>
                            {patients.length === 0 ? (
                                <div className="text-center py-12 text-gray-500">
                                    <div className="text-4xl mb-2">👥</div>
                                    <div>No patients registered yet</div>
                                    <div className="text-sm mt-2">Please register patients in Reception module first</div>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {patients.map(patient => (
                                        <div 
                                            key={patient.patientId}
                                            className="flex justify-between items-center p-4 border rounded-lg hover:shadow-md cursor-pointer transition-all hover:border-blue-400 bg-gray-50"
                                            onClick={() => handlePatientSelect(patient)}
                                        >
                                            <div>
                                                <div className="font-semibold text-lg">{patient.firstName} {patient.lastName}</div>
                                                <div className="text-sm text-gray-600">{patient.patientId} | Age: {patient.age} | {patient.gender}</div>
                                                {patient.phone && <div className="text-sm text-gray-500">📞 {patient.phone}</div>}
                                            </div>
                                            <button className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                                                Select →
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Step 2: Create Encounter */}
                    {step === 2 && selectedPatient && (
                        <div>
                            <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg mb-6">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <div className="font-semibold text-lg">Selected Patient: {selectedPatient.firstName} {selectedPatient.lastName}</div>
                                        <div className="text-sm text-gray-600">{selectedPatient.patientId} | Age: {selectedPatient.age} | {selectedPatient.gender}</div>
                                    </div>
                                    <button 
                                        onClick={() => {setStep(1); setSelectedPatient(null); setMessage(null);}}
                                        className="px-4 py-2 bg-white border border-blue-300 text-blue-700 rounded-lg hover:bg-blue-100 font-medium"
                                    >
                                        ← Change Patient
                                    </button>
                                </div>
                            </div>

                            {/* Previous Encounters */}
                            {encounters.length > 0 && (
                                <div className="hms-card" style={{marginBottom:"1.5rem"}}>
                                    <h3 className="text-lg font-semibold mb-4 text-purple-700">
                                        📋 Previous Encounters ({encounters.length})
                                    </h3>
                                    <div className="space-y-3">
                                        {encounters.map(enc => (
                                            <div key={enc.encounterId} className="hms-patient-card">
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1">
                                                        <div className="font-semibold text-blue-700">{enc.doctorName}</div>
                                                        <div className="text-sm text-gray-700 mt-1"><strong>Diagnosis:</strong> {enc.diagnosis}</div>
                                                        {enc.notes && <div className="text-sm text-gray-600 mt-1"><strong>Notes:</strong> {enc.notes}</div>}
                                                        <div className="text-xs text-gray-500 mt-2">{new Date(enc.createdAt).toLocaleString()}</div>
                                                    </div>
                                                    <button 
                                                        onClick={() => viewEncounter(enc)}
                                                        className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 text-sm font-medium"
                                                    >
                                                        {selectedEncounter?.encounterId === enc.encounterId ? 'Hide Tests' : 'View Tests'}
                                                    </button>
                                                </div>
                                                {selectedEncounter?.encounterId === enc.encounterId && (
                                                    <div className="mt-4 pt-4 border-t">
                                                        <div className="font-medium text-sm mb-2">🔬 Lab Test Results:</div>
                                                        {encounterTests.length > 0 ? (
                                                            <div className="space-y-2">
                                                                {encounterTests.map(test => (
                                                                    <div key={test.testId} className="bg-white p-3 rounded border">
                                                                        <div className="flex justify-between items-start">
                                                                            <div className="flex-1">
                                                                                <div className="font-medium">{test.testName}</div>
                                                                                <div className={`text-sm mt-1 ${test.status === 'COMPLETED' ? 'text-green-600' : 'text-orange-600'}`}>
                                                                                    Status: {test.status}
                                                                                </div>
                                                                            </div>
                                                                            {test.status === 'COMPLETED' && (
                                                                                <div className="bg-green-50 px-3 py-1 rounded text-green-800 text-sm">
                                                                                    ✓ Completed
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                        {test.status === 'COMPLETED' && (
                                                                            <div className="mt-2 p-2 bg-green-50 rounded border border-green-200">
                                                                                <div className="text-xs font-medium text-green-800">Result:</div>
                                                                                <div className="text-sm text-green-700">{test.result}</div>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        ) : (
                                                            <div className="text-sm text-gray-500 bg-gray-100 p-3 rounded">No tests ordered for this encounter</div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* New Encounter Form */}
                            <div className="hms-card">
                                <h3 className="hms-card-title">
                                    ➕ Create New Encounter
                                </h3>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Select Doctor <span className="text-red-500">*</span>
                                        </label>
                                        <select
                                            value={doctorName}
                                            onChange={(e) => setDoctorName(e.target.value)}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="">-- Select Doctor --</option>
                                            {doctors.map(doc => (
                                                <option key={doc.doctorId} value={doc.name}>Dr. {doc.name} ({doc.specialization})</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Diagnosis <span className="text-red-500">*</span>
                                        </label>
                                        <input
                                            type="text"
                                            value={diagnosis}
                                            onChange={(e) => setDiagnosis(e.target.value)}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            placeholder="Enter primary diagnosis"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Clinical Notes (Optional)
                                        </label>
                                        <textarea
                                            value={notes}
                                            onChange={(e) => setNotes(e.target.value)}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            rows="3"
                                            placeholder="Additional clinical observations, symptoms, etc."
                                        />
                                    </div>

                                    {/* Lab Tests */}
                                    <div className="bg-purple-50 border border-purple-200 rounded-lg p-4">
                                        <label className="block text-sm font-medium text-purple-800 mb-3">
                                            🔬 Order Lab Tests
                                        </label>
                                        <div className="flex flex-wrap gap-2 mb-3">
                                            {availableTests.map(test => (
                                                <button
                                                    key={test}
                                                    type="button"
                                                    onClick={() => addLabTest(test)}
                                                    disabled={labTests.find(t => t.testName === test)}
                                                    className={`px-3 py-2 text-sm rounded-lg font-medium transition-all ${
                                                        labTests.find(t => t.testName === test)
                                                            ? 'bg-green-500 text-white cursor-not-allowed'
                                                            : 'bg-white border border-purple-300 text-purple-700 hover:bg-purple-100'
                                                    }`}
                                                >
                                                    {labTests.find(t => t.testName === test) ? '✓ ' : ''}{test}
                                                </button>
                                            ))}
                                        </div>
                                        {labTests.length > 0 && (
                                            <div className="border-t border-purple-200 pt-3 mt-3">
                                                <div className="text-sm font-medium mb-2 text-purple-800">
                                                    Selected Tests ({labTests.length}):
                                                </div>
                                                <div className="space-y-2">
                                                    {labTests.map(test => (
                                                        <div key={test.testName} className="flex justify-between items-center bg-white p-3 rounded-lg border border-purple-200">
                                                            <span className="text-sm font-medium">{test.testName}</span>
                                                            <button
                                                                type="button"
                                                                onClick={() => removeLabTest(test.testName)}
                                                                className="text-red-600 hover:text-red-800 text-sm font-medium"
                                                            >
                                                                ✕ Remove
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Prescription */}
                                    <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="block text-sm font-medium text-green-800">
                                                💊 Prescription
                                            </label>
                                            <button
                                                type="button"
                                                onClick={addMedicine}
                                                className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium"
                                            >
                                                + Add Medicine
                                            </button>
                                        </div>

                                        {medicines.length > 0 ? (
                                            <div className="space-y-4">
                                                {medicines.map((med, index) => (
                                                    <div key={index} className="bg-white p-4 rounded-lg border border-green-200">
                                                        <div className="grid grid-cols-2 gap-3 mb-3">
                                                            <input
                                                                type="text"
                                                                placeholder="Medicine name *"
                                                                value={med.medicineName}
                                                                onChange={(e) => updateMedicine(index, 'medicineName', e.target.value)}
                                                                className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                                                            />
                                                            <input
                                                                type="text"
                                                                placeholder="Dosage (e.g., 500mg) *"
                                                                value={med.dosage}
                                                                onChange={(e) => updateMedicine(index, 'dosage', e.target.value)}
                                                                className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                                                            />
                                                        </div>
                                                        <div className="grid grid-cols-3 gap-3">
                                                            <input
                                                                type="text"
                                                                placeholder="Duration (e.g., 7 days)"
                                                                value={med.duration}
                                                                onChange={(e) => updateMedicine(index, 'duration', e.target.value)}
                                                                className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                                                            />
                                                            <input
                                                                type="number"
                                                                min="1"
                                                                placeholder="Quantity"
                                                                value={med.quantity}
                                                                onChange={(e) => updateMedicine(index, 'quantity', parseInt(e.target.value) || 1)}
                                                                className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                                                            />
                                                            <input
                                                                type="number"
                                                                min="0"
                                                                placeholder="Price (₹)"
                                                                value={med.price}
                                                                onChange={(e) => updateMedicine(index, 'price', parseInt(e.target.value) || 50)}
                                                                className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                                                            />
                                                        </div>
                                                        <button
                                                            type="button"
                                                            onClick={() => removeMedicine(index)}
                                                            className="mt-3 text-red-600 hover:text-red-800 text-sm font-medium"
                                                        >
                                                            ✕ Remove Medicine
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="text-sm text-gray-500 text-center py-4 bg-white rounded border border-green-200">
                                                No medicines added yet. Click "Add Medicine" to prescribe.
                                            </div>
                                        )}
                                    </div>

                                    <button
                                        type="button"
                                        onClick={handleSubmit}
                                        disabled={loading}
                                        className="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 px-4 rounded-lg hover:from-blue-700 hover:to-blue-800 font-semibold text-lg transition-all disabled:bg-gray-400 shadow-lg"
                                    >
                                        {loading ? 'Creating Encounter...' : '✅ Create Encounter & Submit Orders'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // LAB MODULE
        // ============================================
        function LabModule() {
            const [tests, setTests] = useState([]);
            const [selectedTest, setSelectedTest] = useState(null);
            const [result, setResult] = useState('');
            const [message, setMessage] = useState(null);
            const [filter, setFilter] = useState('PENDING');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                loadTests();
            }, [filter]);

            const loadTests = async () => {
                if (filter === 'PENDING') {
                    const pendingTests = await LabService.getPendingTests();
                    setTests(pendingTests.sort((a, b) => new Date(b.orderedAt) - new Date(a.orderedAt)));
                } else {
                    const allTests = await LabService.getAllTests();
                    setTests(allTests.sort((a, b) => new Date(b.orderedAt) - new Date(a.orderedAt)));
                }
            };

            const handleSubmitResult = async () => {
                if (!result.trim()) {
                    setMessage({ type: 'error', text: '❌ Please enter test result' });
                    return;
                }

                setLoading(true);
                try {
                    await LabService.updateTestResult(selectedTest.testId, result);
                    setMessage({ type: 'success', text: `✅ Test result submitted successfully!\n\nTest: ${selectedTest.testName}\nResult: ${result}` });
                    setSelectedTest(null);
                    setResult('');
                    await loadTests();
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Failed to submit result: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="hms-page-title">
                        <span className="mr-3">🔬</span>
                        Laboratory Module
                    </h2>

                    {message && (
                        <div className={`mb-6 p-4 rounded-lg shadow-md ${message.type === 'success' ? 'bg-green-50 border-l-4 border-green-500 text-green-800' : 'bg-red-50 border-l-4 border-red-500 text-red-800'}`}>
                            <div className="font-medium whitespace-pre-line">{message.text}</div>
                        </div>
                    )}

                    <div className="hms-card">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 className="text-xl font-semibold text-purple-700">Lab Tests</h3>
                            <div className="flex gap-2">
                                <button
                                    onClick={() => setFilter('PENDING')}
                                    className={`px-6 py-2 rounded-lg font-medium transition-all ${
                                        filter === 'PENDING' 
                                            ? 'bg-orange-600 text-white shadow-md' 
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    Pending Tests
                                </button>
                                <button
                                    onClick={() => setFilter('ALL')}
                                    className={`px-6 py-2 rounded-lg font-medium transition-all ${
                                        filter === 'ALL' 
                                            ? 'bg-purple-600 text-white shadow-md' 
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                    }`}
                                >
                                    All Tests
                                </button>
                            </div>
                        </div>

                        {tests.length === 0 ? (
                            <div className="text-center py-16 text-gray-500">
                                <div className="text-6xl mb-4">🔬</div>
                                <div className="text-xl font-medium">No {filter === 'PENDING' ? 'pending' : ''} tests found</div>
                                <div className="text-sm mt-2">Tests ordered by doctors will appear here</div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {tests.map(test => (
                                    <div key={test.testId} className={`border-2 rounded-lg p-5 transition-all ${
                                        test.status === 'COMPLETED' 
                                            ? 'bg-green-50 border-green-200' 
                                            : 'bg-orange-50 border-orange-200'
                                    }`}>
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="font-semibold text-xl text-gray-800 mb-2">{test.testName}</div>
                                                <div className="grid grid-cols-2 gap-2 text-sm">
                                                    <div>
                                                        <span className="text-gray-600">Patient ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-blue-600">{test.patientId}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Encounter ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-purple-600">{test.encounterId}</span>
                                                    </div>
                                                </div>
                                                <div className="text-xs text-gray-500 mt-2">
                                                    Ordered: {new Date(test.orderedAt).toLocaleString()}
                                                </div>
                                                <div className="mt-3">
                                                    <span className={`inline-block px-4 py-1 text-sm rounded-full font-medium ${
                                                        test.status === 'COMPLETED' 
                                                            ? 'bg-green-500 text-white' 
                                                            : 'bg-orange-500 text-white'
                                                    }`}>
                                                        {test.status === 'COMPLETED' ? '✓ COMPLETED' : '⏳ PENDING'}
                                                    </span>
                                                </div>
                                                {test.status === 'COMPLETED' && (
                                                    <div className="mt-4 p-4 bg-white rounded-lg border-2 border-green-300">
                                                        <div className="text-sm font-semibold text-green-800 mb-1">Test Result:</div>
                                                        <div className="text-sm text-gray-700">{test.result}</div>
                                                        <div className="text-xs text-gray-500 mt-2">
                                                            Completed: {new Date(test.completedAt).toLocaleString()}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            {test.status === 'PENDING' && (
                                                <button
                                                    onClick={() => {setSelectedTest(test); setMessage(null);}}
                                                    className="ml-4 px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-medium transition-all shadow-md"
                                                >
                                                    Enter Result →
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Result Entry Modal */}
                    {selectedTest && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg p-6 max-w-lg w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-4 text-purple-700">Enter Test Result</h3>
                                <div className="mb-4 p-4 bg-purple-50 rounded-lg border border-purple-200">
                                    <div className="text-sm text-gray-700 mb-2">
                                        <span className="font-medium">Test:</span> 
                                        <span className="ml-2 text-purple-700 font-semibold">{selectedTest.testName}</span>
                                    </div>
                                    <div className="text-sm text-gray-700 mb-2">
                                        <span className="font-medium">Patient ID:</span> 
                                        <span className="ml-2 font-mono">{selectedTest.patientId}</span>
                                    </div>
                                    <div className="text-sm text-gray-700">
                                        <span className="font-medium">Encounter ID:</span> 
                                        <span className="ml-2 font-mono">{selectedTest.encounterId}</span>
                                    </div>
                                </div>
                                <textarea
                                    value={result}
                                    onChange={(e) => setResult(e.target.value)}
                                    className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                                    rows="5"
                                    placeholder="Enter test result (e.g., Normal, Abnormal with values, detailed findings, etc.)"
                                />
                                <div className="flex gap-3 mt-4">
                                    <button
                                        onClick={handleSubmitResult}
                                        disabled={loading}
                                        className="hms-btn hms-btn-success"
                                    >
                                        {loading ? 'Submitting...' : '✅ Submit Result'}
                                    </button>
                                    <button
                                        onClick={() => {setSelectedTest(null); setResult('');}}
                                        className="flex-1 bg-gray-300 text-gray-700 py-3 px-4 rounded-lg hover:bg-gray-400 font-medium transition-all"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // PHARMACY MODULE
        // ============================================
        function PharmacyModule() {
            const [prescriptions, setPrescriptions] = useState([]);
            const [selectedPrescription, setSelectedPrescription] = useState(null);
            const [patientDetails, setPatientDetails] = useState(null);
            const [message, setMessage] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                loadPrescriptions();
            }, []);

            const loadPrescriptions = async () => {
                const pending = await PharmacyService.getPendingPrescriptions();
                setPrescriptions(pending.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            };

            const viewPrescription = async (prescription) => {
                const patient = await PatientService.getPatient(prescription.patientId);
                setPatientDetails(patient);
                setSelectedPrescription(prescription);
                setMessage(null);
            };

            const handleIssueMedicines = async () => {
                setLoading(true);
                try {
                    const bill = await PharmacyService.issueMedicines(selectedPrescription.prescriptionId, selectedPrescription.medicines);
                    setMessage({ 
                        type: 'success', 
                        text: `✅ Medicines issued successfully!\n\nBill ID: ${bill.billId}\nTotal Amount: ₹${bill.totalAmount}\n\nBill is now available in Billing module.` 
                    });
                    setSelectedPrescription(null);
                    setPatientDetails(null);
                    await loadPrescriptions();
                } catch (error) {
                    setMessage({ type: 'error', text: '❌ Failed to issue medicines: ' + error.message });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="hms-page-title">
                        <span className="mr-3">💊</span>
                        Pharmacy Module
                    </h2>

                    {message && (
                        <div className={`mb-6 p-4 rounded-lg shadow-md ${message.type === 'success' ? 'bg-green-50 border-l-4 border-green-500 text-green-800' : 'bg-red-50 border-l-4 border-red-500 text-red-800'}`}>
                            <div className="font-medium whitespace-pre-line">{message.text}</div>
                        </div>
                    )}

                    <div className="hms-card">
                        <h3 className="hms-card-title">
                            Pending Prescriptions ({prescriptions.length})
                        </h3>

                        {prescriptions.length === 0 ? (
                            <div className="text-center py-16 text-gray-500">
                                <div className="text-6xl mb-4">💊</div>
                                <div className="text-xl font-medium">No pending prescriptions</div>
                                <div className="text-sm mt-2">Prescriptions created by doctors will appear here</div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {prescriptions.map(prescription => (
                                    <div key={prescription.prescriptionId} className="border-2 border-green-200 rounded-lg p-5 bg-green-50 transition-all hover:shadow-md">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="font-semibold text-lg text-gray-800">
                                                    Prescription ID: <span className="font-mono text-green-700">{prescription.prescriptionId}</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 text-sm mt-2">
                                                    <div>
                                                        <span className="text-gray-600">Patient ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-blue-600">{prescription.patientId}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Encounter ID:</span>
                                                        <span className="ml-2 font-mono font-medium text-purple-600">{prescription.encounterId}</span>
                                                    </div>
                                                </div>
                                                <div className="text-sm text-gray-700 mt-2">
                                                    <span className="font-medium">Medicines:</span> {prescription.medicines.length} items
                                                </div>
                                                <div className="text-xs text-gray-500 mt-2">
                                                    Created: {new Date(prescription.createdAt).toLocaleString()}
                                                </div>
                                            </div>
                                            <button
                                                onClick={() => viewPrescription(prescription)}
                                                className="ml-4 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium transition-all shadow-md"
                                            >
                                                View & Issue →
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Prescription Details Modal */}
                    {selectedPrescription && patientDetails && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                                <h3 className="text-2xl font-bold mb-4 text-green-700">💊 Prescription Details</h3>
                                
                                <div className="mb-4 p-4 bg-blue-50 rounded-lg border-2 border-blue-200">
                                    <div className="font-semibold text-lg text-blue-800 mb-2">Patient Information</div>
                                    <div className="grid grid-cols-2 gap-2 text-sm">
                                        <div>
                                            <span className="text-gray-600">Name:</span>
                                            <span className="ml-2 font-medium">{patientDetails.firstName} {patientDetails.lastName}</span>
                                        </div>
                                        <div>
                                            <span className="text-gray-600">Patient ID:</span>
                                            <span className="ml-2 font-mono">{patientDetails.patientId}</span>
                                        </div>
                                        <div>
                                            <span className="text-gray-600">Age:</span>
                                            <span className="ml-2">{patientDetails.age}</span>
                                        </div>
                                        <div>
                                            <span className="text-gray-600">Gender:</span>
                                            <span className="ml-2">{patientDetails.gender}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-4">
                                    <div className="font-semibold text-lg mb-3 text-green-800">Medicines to Issue:</div>
                                    <div className="space-y-3">
                                        {selectedPrescription.medicines.map((med, index) => (
                                            <div key={index} className="border-2 border-green-200 rounded-lg p-4 bg-green-50">
                                                <div className="font-semibold text-lg text-gray-800 mb-2">{index + 1}. {med.medicineName}</div>
                                                <div className="grid grid-cols-3 gap-3 text-sm">
                                                    <div>
                                                        <span className="text-gray-600">Dosage:</span>
                                                        <span className="ml-2 font-medium">{med.dosage}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Duration:</span>
                                                        <span className="ml-2 font-medium">{med.duration}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-gray-600">Quantity:</span>
                                                        <span className="ml-2 font-medium">{med.quantity}</span>
                                                    </div>
                                                </div>
                                                <div className="mt-2 text-sm font-medium text-green-700">
                                                    Price: ₹{med.price || 50} × {med.quantity} = ₹{(med.price || 50) * med.quantity}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-green-100 border-2 border-green-400 p-4 rounded-lg mb-4">
                                    <div className="text-2xl font-bold text-green-800">
                                        Total Bill Amount: ₹{selectedPrescription.medicines.reduce((sum, med) => sum + ((med.price || 50) * med.quantity), 0)}
                                    </div>
                                </div>

                                <div className="flex gap-3">
                                    <button
                                        onClick={handleIssueMedicines}
                                        disabled={loading}
                                        className="hms-btn hms-btn-success"
                                    >
                                        {loading ? 'Processing...' : '✅ Issue Medicines & Generate Bill'}
                                    </button>
                                    <button
                                        onClick={() => {setSelectedPrescription(null); setPatientDetails(null);}}
                                        className="flex-1 bg-gray-300 text-gray-700 py-3 px-4 rounded-lg hover:bg-gray-400 font-semibold transition-all"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // BILLING MODULE
        // ============================================
        function BillingModule() {
            const [patients, setPatients] = useState([]);
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [bills, setBills] = useState([]);

            useEffect(() => {
                loadPatients();
            }, []);

            const loadPatients = async () => {
                const allPatients = await PatientService.getAllPatients();
                setPatients(allPatients.sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt)));
            };

            const loadPatientBills = async (patientId) => {
                const patientBills = await BillingService.getBillsByPatient(patientId);
                setBills(patientBills.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            };

            const handlePatientSelect = async (patient) => {
                setSelectedPatient(patient);
                await loadPatientBills(patient.patientId);
            };

            const getTotalAmount = () => bills.reduce((sum, bill) => sum + bill.totalAmount, 0);

            return (
                <div className="max-w-7xl mx-auto">
                    <h2 className="hms-page-title">
                        <span className="mr-3">💳</span>
                        Billing Module (Demo)
                    </h2>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Patient List */}
                        <div className="lg:col-span-1">
                            <div className="hms-card" style={{position:"sticky", top:"80px"}}>
                                <h3 className="text-lg font-semibold mb-4 text-blue-700 border-b pb-2">Select Patient</h3>
                                <div className="space-y-2 max-h-[600px] overflow-y-auto">
                                    {patients.length === 0 ? (
                                        <div className="text-center py-8 text-gray-500">
                                            <div className="text-4xl mb-2">👥</div>
                                            <div className="text-sm">No patients registered</div>
                                        </div>
                                    ) : (
                                        patients.map(patient => (
                                            <div
                                                key={patient.patientId}
                                                onClick={() => handlePatientSelect(patient)}
                                                className={`p-3 border-2 rounded-lg cursor-pointer transition-all ${
                                                    selectedPatient?.patientId === patient.patientId 
                                                        ? 'bg-blue-100 border-blue-500 shadow-md' 
                                                        : 'border-gray-200 hover:bg-blue-50 hover:border-blue-300'
                                                }`}
                                            >
                                                <div className="font-semibold text-gray-800">{patient.firstName} {patient.lastName}</div>
                                                <div className="text-xs font-mono text-gray-600">{patient.patientId}</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Bills */}
                        <div className="lg:col-span-2">
                            <div className="hms-card">
                                <h3 className="text-lg font-semibold mb-4 text-green-700 border-b pb-2">
                                    {selectedPatient ? `Bills for ${selectedPatient.firstName} ${selectedPatient.lastName}` : 'Patient Bills'}
                                </h3>
                                {!selectedPatient ? (
                                    <div className="text-gray-500 text-center py-16">
                                        <div className="text-6xl mb-4">💳</div>
                                        <div className="text-xl">Select a patient to view bills</div>
                                    </div>
                                ) : bills.length === 0 ? (
                                    <div className="text-gray-500 text-center py-16">
                                        <div className="text-6xl mb-4">📄</div>
                                        <div className="text-xl">No bills found for this patient</div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="mb-6 p-4 bg-gradient-to-r from-green-100 to-blue-100 rounded-lg border-2 border-green-300">
                                            <div className="text-center">
                                                <div className="text-sm text-gray-600 mb-1">Total Bills: {bills.length}</div>
                                                <div className="text-3xl font-bold text-green-700">
                                                    Total Amount: ₹{getTotalAmount()}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-4 max-h-[700px] overflow-y-auto">
                                            {bills.map(bill => (
                                                <div key={bill.billId} className="border-2 border-gray-200 rounded-lg p-5 bg-gray-50">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <div className="font-semibold text-xl text-gray-800">{bill.billId}</div>
                                                            <div className={`inline-block mt-2 px-3 py-1 rounded-full text-sm font-medium ${
                                                                bill.type === 'REGISTRATION' 
                                                                    ? 'bg-blue-100 text-blue-700' 
                                                                    : 'bg-green-100 text-green-700'
                                                            }`}>
                                                                {bill.type === 'REGISTRATION' ? '📋 Registration' : '💊 Pharmacy'}
                                                            </div>
                                                            <div className="text-xs text-gray-500 mt-2">
                                                                {new Date(bill.createdAt).toLocaleString()}
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-3xl font-bold text-green-600">
                                                                ₹{bill.totalAmount}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="border-t-2 border-gray-300 pt-4">
                                                        <div className="text-sm font-semibold mb-3 text-gray-700">Itemized Bill:</div>
                                                        <div className="bg-white rounded-lg overflow-hidden border border-gray-200">
                                                            <table className="w-full text-sm">
                                                                <thead className="bg-gray-100 border-b-2 border-gray-300">
                                                                    <tr>
                                                                        <th className="text-left p-3 font-semibold">Item</th>
                                                                        <th className="text-center p-3 font-semibold">Qty</th>
                                                                        <th className="text-right p-3 font-semibold">Price</th>
                                                                        <th className="text-right p-3 font-semibold">Total</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {bill.items.map((item, index) => (
                                                                        <tr key={index} className="border-b border-gray-200 hover:bg-gray-50">
                                                                            <td className="p-3">{item.name}</td>
                                                                            <td className="text-center p-3">{item.quantity}</td>
                                                                            <td className="text-right p-3">₹{item.price}</td>
                                                                            <td className="text-right p-3 font-medium">₹{item.total}</td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                                <tfoot className="bg-green-50 border-t-2 border-green-300">
                                                                    <tr>
                                                                        <td colSpan="3" className="text-right p-3 font-bold text-gray-800">Grand Total:</td>
                                                                        <td className="text-right p-3 font-bold text-green-700 text-lg">₹{bill.totalAmount}</td>
                                                                    </tr>
                                                                </tfoot>
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // ADMIN MODULE
        // ============================================
        function AdminModule() {
            const [stats, setStats] = useState(null);

            useEffect(() => {
                loadStats();
                const interval = setInterval(loadStats, 5000); // Refresh every 5 seconds
                return () => clearInterval(interval);
            }, []);

            const loadStats = async () => {
                const dashboardStats = await AdminService.getDashboardStats();
                setStats(dashboardStats);
            };

            if (!stats) {
                return (
                    <div className="flex items-center justify-center py-16">
                        <div className="text-xl text-gray-600">Loading dashboard statistics...</div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto">
                    <h2 className="hms-page-title">
                        <span className="mr-3">📊</span>
                        Admin Dashboard
                    </h2>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <div className="hms-stat-card">
                            <div className="hms-stat-icon" style={{background:'#dbeafe'}}>👤</div>
                            <div><div className="hms-stat-value">{stats.totalPatients}</div><div className="hms-stat-label">Total Patients</div></div>
                        </div>
                        <div className="hms-stat-card">
                            <div className="hms-stat-icon" style={{background:'#d1fae5'}}>🩺</div>
                            <div><div className="hms-stat-value">{stats.totalEncounters}</div><div className="hms-stat-label">Consultations</div></div>
                        </div>
                        <div className="hms-stat-card">
                            <div className="hms-stat-icon" style={{background:'#ede9fe'}}>🔬</div>
                            <div><div className="hms-stat-value">{stats.totalTests}</div><div className="hms-stat-label">Lab Tests · {stats.pendingTests} pending</div></div>
                        </div>
                        <div className="hms-stat-card">
                            <div className="hms-stat-icon" style={{background:'#fef9c3'}}>₹</div>
                            <div><div className="hms-stat-value">₹{stats.totalRevenue}</div><div className="hms-stat-label">Total Revenue</div></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8">
                        <div className="hms-stat-card">
                            <div className="hms-stat-icon" style={{background:'#fce7f3'}}>💊</div>
                            <div><div className="hms-stat-value">{stats.totalPrescriptions}</div><div className="hms-stat-label">Prescriptions · {stats.issuedPrescriptions} issued</div></div>
                        </div>
                        <div className="hms-stat-card">
                            <div className="hms-stat-icon" style={{background:'#ccfbf1'}}>🧾</div>
                            <div><div className="hms-stat-value">{stats.totalBills}</div><div className="hms-stat-label">Bills Generated</div></div>
                        </div>
                    </div>

                    {/* Activity Log */}
                    <div className="hms-card">
                        <div className="hms-card-title">📝 Recent Activity Log</div>
                        <div className="space-y-2 max-h-[500px] overflow-y-auto">
                            {stats.recentActivity.length === 0 ? (
                                <div className="text-center py-8 text-gray-500">
                                    <div className="text-4xl mb-2">📋</div>
                                    <div>No activity yet</div>
                                </div>
                            ) : (
                                stats.recentActivity.map((activity, index) => (
                                    <div key={activity.logId || index} className="hms-patient-card" style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
                                        <div className="flex-1">
                                            <div className="font-semibold text-gray-800">{activity.action}</div>
                                            <div className="text-sm text-gray-600 mt-1">{activity.description}</div>
                                        </div>
                                        <div className="text-xs text-gray-500 whitespace-nowrap ml-4">
                                            {new Date(activity.timestamp).toLocaleString()}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // RENDER APP
        // ============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HospitalManagementSystem />);
    </script>
</body>
</html>
